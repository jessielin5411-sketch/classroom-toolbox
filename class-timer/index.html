<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>班級計時器</title>
  <style>
    :root {
      --ink: #233047;
      --muted: #65758f;
      --paper: #fff7fb;
      --panel: #ffffff;
      --line: #ffd1df;
      --blue: #4f8cff;
      --green: #22b98f;
      --yellow: #ffd24a;
      --red: #ff5d73;
      --pink: #ff8fc7;
      --purple: #9b7bff;
      --orange: #ffad4d;
      --shadow: 0 24px 60px rgba(111, 78, 143, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 210, 74, 0.45), transparent 22%),
        radial-gradient(circle at 88% 12%, rgba(155, 123, 255, 0.28), transparent 24%),
        radial-gradient(circle at 76% 88%, rgba(79, 140, 255, 0.22), transparent 24%),
        linear-gradient(135deg, rgba(255, 143, 199, 0.2), transparent 36%),
        var(--paper);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 173, 77, 0.45) 0 4px, transparent 5px),
        radial-gradient(circle, rgba(79, 140, 255, 0.35) 0 3px, transparent 4px),
        radial-gradient(circle, rgba(34, 185, 143, 0.3) 0 5px, transparent 6px);
      background-position: 32px 40px, 120px 96px, 210px 28px;
      background-size: 260px 180px, 310px 210px, 360px 260px;
      opacity: 0.75;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      position: relative;
      z-index: 1;
    }

    .sidebar {
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 247, 251, 0.9)),
        repeating-linear-gradient(135deg, rgba(255, 143, 199, 0.12) 0 14px, rgba(255, 210, 74, 0.1) 14px 28px);
      border-right: 3px dashed rgba(255, 143, 199, 0.55);
      backdrop-filter: blur(12px);
    }

    .brand {
      margin: 0 0 20px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
      color: #ffffff;
      display: inline-block;
      padding: 12px 16px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 10px 24px rgba(155, 123, 255, 0.25);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      margin-bottom: 14px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf4;
      color: #7b4ed8;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(255, 143, 199, 0.18);
    }

    .section {
      margin-top: 22px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: #8a4f8f;
      font-size: 14px;
      font-weight: 700;
    }

    .mode {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode button,
    .preset,
    .small-button,
    .primary,
    .danger {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      min-height: 44px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(255, 143, 199, 0.2);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      border-color: #ff9fcf;
      box-shadow: 0 8px 0 rgba(255, 143, 199, 0.24);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(255, 143, 199, 0.22);
    }

    .mode button.active {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-color: transparent;
    }

    .time-inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .time-inputs input {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--ink);
      background: #fffdf4;
    }

    .input-caption {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .preset {
      font-weight: 800;
      background: linear-gradient(180deg, #ffffff, #fff1a8);
    }

    .sound-row,
    .title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .title-row input {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fffdf4;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf4;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
    }

    .switch input {
      width: 18px;
      height: 18px;
      accent-color: var(--blue);
    }

    .main {
      display: grid;
      align-items: center;
      padding: 32px;
    }

    .stage {
      width: min(100%, 920px);
      margin: 0 auto;
      text-align: center;
      position: relative;
    }

    .lesson-title {
      margin: 0 0 18px;
      color: #7b4ed8;
      font-size: clamp(22px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.9);
    }

    .timer-card {
      position: relative;
      overflow: hidden;
      padding: clamp(24px, 5vw, 56px);
      border: 4px solid rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 253, 244, 0.94)),
        linear-gradient(135deg, rgba(255, 143, 199, 0.2), rgba(79, 140, 255, 0.12));
      box-shadow: var(--shadow);
    }

    .timer-card::before,
    .timer-card::after {
      content: "★";
      position: absolute;
      color: rgba(255, 173, 77, 0.38);
      font-size: clamp(42px, 8vw, 88px);
      line-height: 1;
      transform: rotate(-12deg);
    }

    .timer-card::before {
      top: 20px;
      left: 24px;
    }

    .timer-card::after {
      right: 28px;
      bottom: 22px;
      color: rgba(79, 140, 255, 0.26);
      transform: rotate(16deg);
    }

    .time {
      position: relative;
      z-index: 1;
      font-variant-numeric: tabular-nums;
      font-size: clamp(72px, 16vw, 180px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
      color: #20304f;
      text-shadow:
        0 6px 0 rgba(255, 210, 74, 0.45),
        0 14px 34px rgba(79, 140, 255, 0.18);
    }

    .current-clock {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 42px;
      margin: 12px auto 0;
      padding: 0 18px;
      border: 2px solid rgba(79, 140, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      color: #4f5f7c;
      font-size: clamp(16px, 2.4vw, 26px);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      box-shadow: 0 8px 18px rgba(79, 140, 255, 0.12);
    }

    .clock-label {
      color: #7b4ed8;
      font-size: 0.72em;
    }

    .status {
      position: relative;
      z-index: 1;
      min-height: 34px;
      margin-top: 18px;
      color: #c04b85;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 800;
    }

    .progress-wrap {
      margin-top: 28px;
      height: 24px;
      overflow: hidden;
      border: 3px solid #ffffff;
      border-radius: 999px;
      background: #ffe6f0;
      box-shadow: inset 0 2px 6px rgba(116, 68, 124, 0.1);
    }

    .progress {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), #89e8c8);
      transform-origin: left center;
      transform: scaleX(1);
      transition: transform 0.25s linear, background 0.25s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 24px;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-color: transparent;
      font-weight: 900;
    }

    .danger {
      color: #fff;
      background: linear-gradient(135deg, var(--red), #ff9a9e);
      border-color: transparent;
      font-weight: 900;
    }

    .small-button {
      font-weight: 800;
    }

    .is-warning .progress {
      background: linear-gradient(90deg, var(--yellow), var(--orange));
    }

    .is-ending .progress {
      background: linear-gradient(90deg, var(--red), #ff9a9e);
    }

    .is-final-seconds .time {
      color: var(--red);
      text-shadow:
        0 6px 0 rgba(255, 210, 74, 0.65),
        0 0 28px rgba(217, 45, 32, 0.24);
    }

    .is-final-seconds .timer-card {
      border-color: rgba(217, 45, 32, 0.28);
    }

    .is-done .timer-card {
      border-color: rgba(217, 45, 32, 0.4);
    }

    .is-done .time {
      color: var(--red);
    }

    .character-art {
      margin-top: 18px;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .character-art img {
      display: block;
      width: min(100%, 780px);
      max-height: 250px;
      object-fit: contain;
      margin: 0 auto;
      filter: drop-shadow(0 16px 22px rgba(111, 78, 143, 0.18));
    }

    .confetti {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      transform: rotate(18deg);
      opacity: 0.82;
      pointer-events: none;
    }

    .confetti.one {
      top: 10%;
      left: -2%;
      background: var(--yellow);
    }

    .confetti.two {
      top: 22%;
      right: -1%;
      background: var(--pink);
      border-radius: 999px;
    }

    .confetti.three {
      bottom: 18%;
      left: 4%;
      background: var(--green);
      transform: rotate(45deg);
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .main {
        padding: 20px;
      }
    }

    @media (max-width: 520px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .presets {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" aria-label="計時器設定">
      <a class="home-link" href="../index.html">← 回首頁</a>
      <h1 class="brand">班級計時器</h1>

      <div class="section">
        <span class="label">模式</span>
        <div class="mode" role="group" aria-label="計時模式">
          <button id="countdownMode" class="active" type="button">倒數</button>
          <button id="countupMode" type="button">正計時</button>
        </div>
      </div>

      <div class="section">
        <label class="label">時間</label>
        <div class="time-inputs">
          <input id="hours" type="number" min="0" max="9" value="0" aria-label="小時">
          <input id="minutes" type="number" min="0" max="99" value="5" aria-label="分鐘">
          <input id="seconds" type="number" min="0" max="59" value="0" aria-label="秒">
        </div>
        <div class="input-caption">
          <span>時</span>
          <span>分</span>
          <span>秒</span>
        </div>
      </div>

      <div class="section">
        <span class="label">常用時間</span>
        <div class="presets">
          <button class="preset" data-minutes="1" type="button">1 分</button>
          <button class="preset" data-minutes="3" type="button">3 分</button>
          <button class="preset" data-minutes="5" type="button">5 分</button>
          <button class="preset" data-minutes="10" type="button">10 分</button>
          <button class="preset" data-minutes="15" type="button">15 分</button>
          <button class="preset" data-minutes="40" type="button">40 分</button>
        </div>
      </div>

      <div class="section">
        <label class="label" for="activityTitle">活動名稱</label>
        <div class="title-row">
          <input id="activityTitle" type="text" value="小組討論" maxlength="24">
          <button id="clearTitle" class="small-button" type="button" aria-label="清除活動名稱">清除</button>
        </div>
      </div>

      <div class="section sound-row">
        <label class="switch">
          <input id="soundToggle" type="checkbox" checked>
          鈴聲
        </label>
        <button id="testSound" class="small-button" type="button">試聽</button>
      </div>
    </aside>

    <main class="main">
      <section class="stage" aria-live="polite">
        <span class="confetti one"></span>
        <span class="confetti two"></span>
        <span class="confetti three"></span>
        <h2 class="lesson-title" id="displayTitle">小組討論</h2>
        <div class="timer-card">
          <div class="time" id="timeDisplay">05:00</div>
          <div class="status" id="status">準備開始</div>
          <div class="progress-wrap" aria-hidden="true">
            <div class="progress" id="progress"></div>
          </div>
          <div class="controls">
            <button id="startPause" class="primary" type="button">開始</button>
            <button id="reset" class="danger" type="button">重設</button>
            <button id="addMinute" class="small-button" type="button">+1 分</button>
            <button id="fullscreen" class="small-button" type="button">全螢幕</button>
          </div>
        </div>
        <div class="character-art" aria-hidden="true">
          <div class="current-clock">
            <span class="clock-label">現在時間</span>
            <span id="currentClock">--:--:--</span>
          </div>
          <img src="assets/classroom-characters.png" alt="">
        </div>
      </section>
    </main>
  </div>

  <script>
    const app = document.querySelector("#app");
    const timeDisplay = document.querySelector("#timeDisplay");
    const currentClock = document.querySelector("#currentClock");
    const statusText = document.querySelector("#status");
    const progress = document.querySelector("#progress");
    const startPause = document.querySelector("#startPause");
    const resetButton = document.querySelector("#reset");
    const addMinute = document.querySelector("#addMinute");
    const fullscreen = document.querySelector("#fullscreen");
    const countdownMode = document.querySelector("#countdownMode");
    const countupMode = document.querySelector("#countupMode");
    const hoursInput = document.querySelector("#hours");
    const minutesInput = document.querySelector("#minutes");
    const secondsInput = document.querySelector("#seconds");
    const activityTitle = document.querySelector("#activityTitle");
    const displayTitle = document.querySelector("#displayTitle");
    const clearTitle = document.querySelector("#clearTitle");
    const soundToggle = document.querySelector("#soundToggle");
    const testSound = document.querySelector("#testSound");

    let mode = "countdown";
    let totalSeconds = 300;
    let remainingSeconds = 300;
    let elapsedSeconds = 0;
    let timerId = null;
    let lastTick = 0;
    let hasFinished = false;
    let lastCountdownBeepSecond = null;

    function clamp(value, min, max) {
      return Math.min(Math.max(Number(value) || 0, min), max);
    }

    function inputSeconds() {
      const hours = clamp(hoursInput.value, 0, 9);
      const minutes = clamp(minutesInput.value, 0, 99);
      const seconds = clamp(secondsInput.value, 0, 59);
      return Math.max(1, (hours * 3600) + (minutes * 60) + seconds);
    }

    function syncInputs(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      hoursInput.value = hours;
      minutesInput.value = minutes;
      secondsInput.value = secs;
    }

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, Math.floor(seconds));
      const hours = Math.floor(safeSeconds / 3600);
      const minutes = Math.floor((safeSeconds % 3600) / 60);
      const secs = safeSeconds % 60;
      const mm = String(minutes).padStart(2, "0");
      const ss = String(secs).padStart(2, "0");
      return hours > 0 ? `${hours}:${mm}:${ss}` : `${mm}:${ss}`;
    }

    function formatCurrentClock(date) {
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      const seconds = String(date.getSeconds()).padStart(2, "0");
      return `${hours}:${minutes}:${seconds}`;
    }

    function playToneSequence(notes, closeAfter = 900) {
      if (!soundToggle.checked) return;
      const Audio = window.AudioContext || window.webkitAudioContext;
      if (!Audio) return;
      const audio = new Audio();
      const now = audio.currentTime;
      notes.forEach(({ offset, frequency, duration, volume, type = "sine" }) => {
        const oscillator = audio.createOscillator();
        const gain = audio.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, now + offset);
        gain.gain.setValueAtTime(0.001, now + offset);
        gain.gain.exponentialRampToValueAtTime(volume, now + offset + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + offset + duration);
        oscillator.connect(gain);
        gain.connect(audio.destination);
        oscillator.start(now + offset);
        oscillator.stop(now + offset + duration + 0.02);
      });
      setTimeout(() => audio.close(), closeAfter);
    }

    function playCountdownBeep() {
      playToneSequence([
        { offset: 0, frequency: 1046, duration: 0.08, volume: 0.18, type: "square" }
      ], 250);
    }

    function playBell() {
      playToneSequence([
        { offset: 0, frequency: 784, duration: 0.22, volume: 0.32 },
        { offset: 0.24, frequency: 1046, duration: 0.28, volume: 0.38 },
        { offset: 0.56, frequency: 1318, duration: 0.42, volume: 0.42 },
        { offset: 1.08, frequency: 1046, duration: 0.5, volume: 0.4 }
      ], 1900);
    }

    function updateClasses(percent) {
      app.classList.toggle("is-warning", mode === "countdown" && percent <= 0.35 && percent > 0.15);
      app.classList.toggle("is-ending", mode === "countdown" && percent <= 0.15 && !hasFinished);
      app.classList.toggle("is-final-seconds", mode === "countdown" && remainingSeconds > 0 && remainingSeconds <= 10 && !hasFinished);
      app.classList.toggle("is-done", hasFinished);
    }

    function renderClock() {
      currentClock.textContent = formatCurrentClock(new Date());
    }

    function render() {
      const displaySeconds = mode === "countdown" ? Math.ceil(remainingSeconds) : elapsedSeconds;
      const percent = mode === "countdown"
        ? remainingSeconds / Math.max(totalSeconds, 1)
        : Math.min(elapsedSeconds / Math.max(totalSeconds, 1), 1);

      timeDisplay.textContent = formatTime(displaySeconds);
      renderClock();
      progress.style.transform = `scaleX(${Math.max(0, Math.min(percent, 1))})`;
      displayTitle.textContent = activityTitle.value.trim() || "班級計時器";

      if (hasFinished) {
        statusText.textContent = mode === "countdown" ? "時間到" : "已達目標時間";
      } else if (timerId) {
        statusText.textContent = mode === "countdown" ? "倒數中" : "計時中";
      } else {
        statusText.textContent = "準備開始";
      }

      startPause.textContent = timerId ? "暫停" : "開始";
      updateClasses(percent);
    }

    function configureFromInputs() {
      totalSeconds = inputSeconds();
      remainingSeconds = totalSeconds;
      elapsedSeconds = 0;
      hasFinished = false;
      lastCountdownBeepSecond = null;
      render();
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function tick() {
      const now = performance.now();
      const delta = Math.max(0, (now - lastTick) / 1000);
      lastTick = now;

      if (mode === "countdown") {
        remainingSeconds = Math.max(0, remainingSeconds - delta);
        const countdownSecond = Math.ceil(remainingSeconds);
        if (countdownSecond > 0 && countdownSecond <= 10 && countdownSecond !== lastCountdownBeepSecond) {
          lastCountdownBeepSecond = countdownSecond;
          playCountdownBeep();
        }
        if (remainingSeconds <= 0) finish();
      } else {
        elapsedSeconds += delta;
        if (elapsedSeconds >= totalSeconds && !hasFinished) finish(false);
      }
      render();
    }

    function finish(shouldStop = true) {
      hasFinished = true;
      playBell();
      if (shouldStop) stopTimer();
    }

    function start() {
      if (hasFinished && mode === "countdown") configureFromInputs();
      if (!timerId) {
        lastTick = performance.now();
        timerId = setInterval(tick, 250);
      }
      render();
    }

    function pause() {
      stopTimer();
      render();
    }

    function setMode(nextMode) {
      stopTimer();
      mode = nextMode;
      countdownMode.classList.toggle("active", mode === "countdown");
      countupMode.classList.toggle("active", mode === "countup");
      configureFromInputs();
    }

    startPause.addEventListener("click", () => {
      timerId ? pause() : start();
    });

    resetButton.addEventListener("click", () => {
      stopTimer();
      configureFromInputs();
    });

    addMinute.addEventListener("click", () => {
      if (mode === "countdown") {
        remainingSeconds += 60;
        totalSeconds += 60;
        syncInputs(totalSeconds);
        lastCountdownBeepSecond = null;
      } else {
        totalSeconds += 60;
        syncInputs(totalSeconds);
      }
      hasFinished = false;
      render();
    });

    fullscreen.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    countdownMode.addEventListener("click", () => setMode("countdown"));
    countupMode.addEventListener("click", () => setMode("countup"));

    [hoursInput, minutesInput, secondsInput].forEach((input) => {
      input.addEventListener("change", configureFromInputs);
      input.addEventListener("input", () => {
        if (!timerId) configureFromInputs();
      });
    });

    document.querySelectorAll(".preset").forEach((button) => {
      button.addEventListener("click", () => {
        stopTimer();
        const seconds = Number(button.dataset.minutes) * 60;
        syncInputs(seconds);
        configureFromInputs();
      });
    });

    activityTitle.addEventListener("input", render);
    clearTitle.addEventListener("click", () => {
      activityTitle.value = "";
      render();
      activityTitle.focus();
    });
    testSound.addEventListener("click", playBell);

    setInterval(renderClock, 1000);

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space" && event.target.tagName !== "INPUT") {
        event.preventDefault();
        timerId ? pause() : start();
      }
      if (event.key.toLowerCase() === "r" && event.target.tagName !== "INPUT") {
        stopTimer();
        configureFromInputs();
      }
    });

    configureFromInputs();
  </script>
</body>
</html>
