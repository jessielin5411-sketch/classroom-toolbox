<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個人寵物記分板</title>
  <style>
    :root {
      --ink: #243047;
      --muted: #65758f;
      --paper: #fff8fb;
      --panel: #ffffff;
      --pink: #ff8fc7;
      --purple: #9b7bff;
      --blue: #4f8cff;
      --green: #22b98f;
      --yellow: #ffd24a;
      --orange: #ffad4d;
      --red: #ff5d73;
      --line: rgba(255, 143, 199, 0.42);
      --shadow: 0 24px 60px rgba(111, 78, 143, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 12%, rgba(255, 210, 74, 0.48), transparent 22%),
        radial-gradient(circle at 90% 10%, rgba(155, 123, 255, 0.28), transparent 24%),
        radial-gradient(circle at 80% 88%, rgba(79, 140, 255, 0.22), transparent 24%),
        linear-gradient(135deg, rgba(255, 143, 199, 0.2), transparent 38%),
        var(--paper);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 173, 77, 0.42) 0 4px, transparent 5px),
        radial-gradient(circle, rgba(79, 140, 255, 0.32) 0 3px, transparent 4px),
        radial-gradient(circle, rgba(34, 185, 143, 0.28) 0 5px, transparent 6px);
      background-position: 32px 40px, 130px 96px, 230px 28px;
      background-size: 260px 180px, 310px 210px, 360px 260px;
      opacity: 0.8;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(300px, 370px) minmax(0, 1fr);
    }

    .sidebar {
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 247, 251, 0.92)),
        repeating-linear-gradient(135deg, rgba(255, 143, 199, 0.12) 0 14px, rgba(255, 210, 74, 0.1) 14px 28px);
      border-right: 3px dashed rgba(255, 143, 199, 0.55);
      backdrop-filter: blur(12px);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      margin-bottom: 14px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf4;
      color: #7b4ed8;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(255, 143, 199, 0.18);
    }

    .side-jump {
      width: 100%;
      margin-top: 8px;
    }

    .brand {
      display: inline-block;
      margin: 0 0 20px;
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 10px 24px rgba(155, 123, 255, 0.25);
    }

    .section {
      margin-top: 20px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: #8a4f8f;
      font-size: 14px;
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: #fffdf4;
      font-weight: 800;
    }

    .button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 900;
      box-shadow: 0 6px 0 rgba(255, 143, 199, 0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 rgba(255, 143, 199, 0.24);
    }

    .button:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(255, 143, 199, 0.2);
    }

    .button.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), var(--purple));
    }

    .button.good {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--green), #82dfc6);
    }

    .button.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--red), #ff9a9e);
    }

    .stack {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stage-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .stage-list li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.75);
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .main {
      padding: 28px;
    }

    .stage {
      width: min(100%, 1220px);
      margin: 0 auto;
    }

    .page-title {
      margin: 0 0 18px;
      color: #7b4ed8;
      text-align: center;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.9);
    }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      min-height: 72px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      text-align: center;
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(111, 78, 143, 0.1);
    }

    .stat strong {
      display: block;
      color: #7b4ed8;
      font-size: 28px;
      font-variant-numeric: tabular-nums;
    }

    .pet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .honor-board {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 3px dashed rgba(255, 143, 199, 0.46);
    }

    .section-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .section-heading h3 {
      margin: 0;
      color: #7b4ed8;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .section-heading p {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.5;
    }

    .honor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }

    .honor-card {
      position: relative;
      min-height: 276px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      overflow: hidden;
      padding: 14px;
      border: 3px solid rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      background:
        radial-gradient(circle at 72% 18%, rgba(255, 210, 74, 0.26), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 253, 244, 0.94));
      box-shadow: 0 16px 34px rgba(111, 78, 143, 0.14);
    }

    .honor-card.maxed {
      border-color: rgba(255, 210, 74, 0.95);
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 210, 74, 0.36), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 247, 213, 0.92));
    }

    .rank-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      display: inline-grid;
      place-items: center;
      min-width: 38px;
      height: 32px;
      padding: 0 8px;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 999px;
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      color: #704100;
      font-weight: 950;
      box-shadow: 0 8px 16px rgba(111, 78, 143, 0.13);
      z-index: 2;
    }

    .honor-top {
      display: grid;
      gap: 3px;
      padding-right: 46px;
    }

    .honor-name {
      color: #20304f;
      font-size: 20px;
      font-weight: 950;
    }

    .honor-stage {
      color: #7b4ed8;
      font-size: 14px;
      font-weight: 900;
    }

    .honor-yard {
      min-height: 132px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 80%, rgba(34, 185, 143, 0.14), transparent 42%),
        rgba(255, 255, 255, 0.46);
    }

    .honor-yard .pet-atlas-frame {
      width: min(100%, 142px);
    }

    .honor-yard .pet-atlas-frame.egg-stage,
    .honor-yard .pet-atlas-frame.hatch-stage {
      width: min(100%, 124px);
    }

    .honor-yard .pet-egg {
      width: 88px;
      height: 106px;
      border-width: 5px;
    }

    .honor-yard .hatch-shell {
      width: 108px;
      height: 58px;
      bottom: 14px;
      border-width: 5px;
    }

    .honor-yard .hatch-stage .pet-atlas {
      width: 88px;
      height: 88px;
      margin-bottom: 32px;
    }

    .honor-meta {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }

    .honor-meta strong {
      color: #20304f;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    .evolution-note {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef8ff;
      color: #2453a6;
      font-size: 12px;
      font-weight: 950;
    }

    .pet-card {
      position: relative;
      overflow: hidden;
      padding: 16px;
      border: 4px solid rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 253, 244, 0.94)),
        linear-gradient(135deg, rgba(255, 143, 199, 0.18), rgba(79, 140, 255, 0.12));
      box-shadow: var(--shadow);
    }

    .pet-card.hungry {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 243, 230, 0.94)),
        linear-gradient(135deg, rgba(255, 173, 77, 0.24), rgba(255, 93, 115, 0.12));
    }

    .pet-card.maxed {
      border-color: rgba(255, 210, 74, 0.95);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .student-no {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 42px;
      border-radius: 999px;
      background: #fff7d1;
      color: #8a5a00;
      font-size: 20px;
      font-weight: 950;
    }

    .stage-name {
      color: #7b4ed8;
      font-weight: 950;
    }

    .pet-yard {
      position: relative;
      min-height: 190px;
      display: grid;
      place-items: center;
      margin: 8px 0 12px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 82%, rgba(34, 185, 143, 0.16), transparent 38%),
        rgba(255, 255, 255, 0.52);
    }

    .pet-atlas-frame {
      position: relative;
      width: min(100%, 220px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      filter:
        drop-shadow(0 18px 22px rgba(111, 78, 143, 0.2))
        saturate(1.08);
    }

    .pet-atlas {
      width: 100%;
      height: 100%;
      background-image: url("assets/pet-atlas.png");
      background-repeat: no-repeat;
      background-size: 400% 300%;
      background-position: var(--atlas-x) var(--atlas-y);
      transform: scale(var(--pet-scale));
      transform-origin: center bottom;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .pet-atlas-frame.mini {
      width: 58px;
      filter: drop-shadow(0 6px 8px rgba(111, 78, 143, 0.16));
    }

    .pet-atlas-frame.egg-stage,
    .pet-atlas-frame.hatch-stage {
      width: min(100%, 190px);
    }

    .pet-egg {
      position: relative;
      width: 132px;
      height: 158px;
      border: 7px solid #fff;
      border-radius: 52% 48% 46% 54% / 58% 58% 42% 42%;
      background:
        radial-gradient(circle at 32% 22%, rgba(255, 255, 255, 0.95) 0 13%, transparent 14%),
        radial-gradient(circle at 68% 38%, rgba(255, 143, 199, 0.44) 0 10%, transparent 11%),
        radial-gradient(circle at 36% 62%, rgba(79, 140, 255, 0.36) 0 9%, transparent 10%),
        linear-gradient(145deg, #fffdf4 0%, #fff0b8 46%, #ffd0e8 100%);
      box-shadow:
        inset -18px -20px 28px rgba(155, 123, 255, 0.14),
        0 18px 24px rgba(111, 78, 143, 0.2);
      animation: eggWiggle 2.8s ease-in-out infinite;
    }

    .pet-egg::before {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      top: 72px;
      height: 20px;
      background: linear-gradient(135deg, transparent 0 16%, #fff 17% 28%, transparent 29% 44%, #fff 45% 58%, transparent 59% 72%, #fff 73% 84%, transparent 85%);
      opacity: 0.75;
    }

    .pet-egg::after {
      content: "";
      position: absolute;
      left: 26px;
      top: 24px;
      width: 34px;
      height: 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      transform: rotate(-24deg);
    }

    .hatch-shell {
      position: absolute;
      left: 50%;
      bottom: 20px;
      width: 152px;
      height: 84px;
      transform: translateX(-50%);
      border: 7px solid #fff;
      border-top: 0;
      border-radius: 0 0 70px 70px;
      background: linear-gradient(145deg, #fffdf4, #ffd5eb);
      box-shadow: 0 16px 20px rgba(111, 78, 143, 0.18);
      z-index: 2;
    }

    .hatch-shell::before {
      content: "";
      position: absolute;
      left: -4px;
      right: -4px;
      top: -19px;
      height: 26px;
      background: linear-gradient(135deg, transparent 0 11%, #fffdf4 12% 23%, transparent 24% 34%, #fffdf4 35% 48%, transparent 49% 60%, #fffdf4 61% 74%, transparent 75% 86%, #fffdf4 87%);
    }

    .hatch-stage .pet-atlas {
      width: 128px;
      height: 128px;
      margin-bottom: 42px;
      clip-path: inset(0 0 28% 0 round 28px);
      filter: saturate(0.92) brightness(1.08);
      z-index: 1;
    }

    .pet-atlas-frame.glow-stage .pet-atlas {
      filter:
        saturate(1.28)
        drop-shadow(0 0 14px rgba(255, 210, 74, 0.86))
        drop-shadow(0 0 28px rgba(255, 143, 199, 0.42));
    }

    .pet-atlas-frame.guardian-stage::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 12px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #fff 0 7%, transparent 8%),
        conic-gradient(from 8deg, transparent 0 8%, #ffd24a 9% 12%, transparent 13% 23%, #ff8fc7 24% 27%, transparent 28% 39%, #4f8cff 40% 43%, transparent 44% 56%, #22b98f 57% 60%, transparent 61% 72%, #ffd24a 73% 76%, transparent 77%);
      filter: drop-shadow(0 0 10px rgba(255, 210, 74, 0.74));
      z-index: 3;
      animation: fireworksPop 1.4s ease-in-out infinite;
    }

    .pet-atlas-frame.guardian-stage::after {
      content: "";
      position: absolute;
      top: 34px;
      right: 10px;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #fff 0 6%, transparent 7%),
        conic-gradient(from 22deg, transparent 0 10%, #7dd3fc 11% 14%, transparent 15% 25%, #f0abfc 26% 29%, transparent 30% 41%, #ffd24a 42% 45%, transparent 46% 57%, #ff5d73 58% 61%, transparent 62% 74%, #22b98f 75% 78%, transparent 79%);
      filter: drop-shadow(0 0 12px rgba(155, 123, 255, 0.54));
      z-index: 3;
      animation: fireworksPop 1.65s ease-in-out infinite 0.25s;
    }

    .pet-atlas-frame.mini.guardian-stage::before,
    .pet-atlas-frame.mini.guardian-stage::after {
      display: none;
    }

    .pet-card:not(.maxed) .pet-atlas {
      animation: petFloat 2.6s ease-in-out infinite;
    }

    .pet-card.hungry .pet-atlas {
      animation: petHungry 0.85s ease-in-out infinite;
      filter: grayscale(0.28) saturate(0.82);
    }

    .pet-card.maxed .pet-atlas {
      animation: petCelebrate 1.25s ease-in-out infinite;
      filter: saturate(1.24) contrast(1.04);
    }

    .pet-mood {
      position: absolute;
      top: 8px;
      right: 8px;
      display: inline-grid;
      place-items: center;
      min-width: 42px;
      height: 34px;
      padding: 0 8px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 6px 16px rgba(111, 78, 143, 0.14);
      font-size: 20px;
      font-weight: 950;
    }

    .pet-mood.mini {
      display: none;
    }

    .pet-stage-glow {
      position: absolute;
      inset: auto 18% 4% 18%;
      height: 18%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(34, 185, 143, 0.22), transparent 70%);
      z-index: -1;
    }

    .pet-svg {
      width: min(100%, 214px);
      height: 186px;
      overflow: visible;
      filter:
        drop-shadow(0 18px 22px rgba(111, 78, 143, 0.2))
        saturate(1.08);
    }

    .pet-svg.mini {
      width: 54px;
      height: 50px;
      filter: drop-shadow(0 6px 8px rgba(111, 78, 143, 0.16));
    }

    .pet-card:not(.maxed) .pet-svg {
      animation: petFloat 2.6s ease-in-out infinite;
    }

    .pet-card.hungry .pet-svg {
      animation: petHungry 0.85s ease-in-out infinite;
    }

    .pet-card.maxed .pet-svg {
      animation: petCelebrate 1.25s ease-in-out infinite;
    }

    .blink {
      transform-origin: center;
      animation: blink 3.8s infinite;
    }

    .tail,
    .wing,
    .antenna,
    .arm {
      transform-box: fill-box;
      transform-origin: center;
      animation: wiggle 1.8s ease-in-out infinite;
    }

    .ear {
      transform-box: fill-box;
      transform-origin: bottom center;
      animation: earWiggle 2.4s ease-in-out infinite;
    }

    .pupil {
      animation: lookAround 4.6s ease-in-out infinite;
    }

    .blush {
      animation: blushPulse 2.8s ease-in-out infinite;
    }

    .spark {
      animation: sparkle 1.1s ease-in-out infinite alternate;
    }

    .eye-shine {
      animation: eyeShine 2.2s ease-in-out infinite;
    }

    @keyframes petFloat {
      0%, 100% {
        transform: translateY(2px) scale(var(--pet-scale, 1));
      }

      50% {
        transform: translateY(-10px) scale(calc(var(--pet-scale, 1) * 1.025));
      }
    }

    @keyframes petHungry {
      0%, 100% {
        transform: translateX(0) rotate(0) scale(var(--pet-scale, 1));
      }

      25% {
        transform: translateX(-2px) rotate(-1deg) scale(var(--pet-scale, 1));
      }

      75% {
        transform: translateX(2px) rotate(1deg) scale(var(--pet-scale, 1));
      }
    }

    @keyframes petCelebrate {
      0%, 100% {
        transform: translateY(-4px) scale(var(--pet-scale, 1));
      }

      50% {
        transform: translateY(-15px) scale(calc(var(--pet-scale, 1) * 1.06));
      }
    }

    @keyframes eggWiggle {
      0%, 100% {
        transform: rotate(-2deg) translateY(2px);
      }

      50% {
        transform: rotate(3deg) translateY(-7px);
      }
    }

    @keyframes fireworksPop {
      0%, 100% {
        opacity: 0.45;
        transform: scale(0.72) rotate(0);
      }

      50% {
        opacity: 1;
        transform: scale(1.08) rotate(16deg);
      }
    }

    @keyframes blink {
      0%, 88%, 100% {
        transform: scaleY(1);
      }

      92% {
        transform: scaleY(0.08);
      }
    }

    @keyframes wiggle {
      0%, 100% {
        transform: rotate(-5deg);
      }

      50% {
        transform: rotate(8deg);
      }
    }

    @keyframes earWiggle {
      0%, 100% {
        transform: rotate(-3deg);
      }

      50% {
        transform: rotate(7deg);
      }
    }

    @keyframes lookAround {
      0%, 18%, 100% {
        transform: translateX(0);
      }

      36%, 52% {
        transform: translateX(2px);
      }

      70%, 82% {
        transform: translateX(-2px);
      }
    }

    @keyframes blushPulse {
      0%, 100% {
        opacity: 0.46;
      }

      50% {
        opacity: 0.78;
      }
    }

    @keyframes sparkle {
      from {
        opacity: 0.35;
        transform: scale(0.88);
      }

      to {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    @keyframes eyeShine {
      0%, 100% {
        opacity: 0.82;
      }

      50% {
        opacity: 1;
      }
    }

    .collection {
      min-height: 62px;
      margin: 4px 0 12px;
      padding: 8px;
      border: 1px dashed rgba(155, 123, 255, 0.35);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
    }

    .collection-title {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .collection-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-height: 50px;
    }

    .collection-empty {
      color: #98a2b3;
      font-size: 13px;
      font-weight: 800;
    }

    .score-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 900;
    }

    .score {
      color: #20304f;
      font-size: 28px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .progress-wrap {
      height: 14px;
      overflow: hidden;
      border: 2px solid #ffffff;
      border-radius: 999px;
      background: #ffe6f0;
    }

    .progress {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), #82dfc6);
      transform-origin: left center;
      transform: scaleX(var(--progress));
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .actions .button {
      min-height: 40px;
    }

    .rebirth {
      grid-column: 1 / -1;
      display: none;
    }

    .pet-card.maxed .rebirth {
      display: block;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 3px dashed rgba(255, 143, 199, 0.55);
      }

      .summary-bar {
        grid-template-columns: repeat(2, 1fr);
      }

      .section-heading {
        align-items: start;
        flex-direction: column;
      }
    }

    @media (max-width: 560px) {
      .main {
        padding: 20px;
      }

      .row,
      .summary-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar" aria-label="個人寵物記分設定">
      <a class="home-link" href="../index.html">← 回首頁</a>
      <h1 class="brand">個人寵物記分板</h1>
      <a class="home-link side-jump" href="#honorBoard">全班寵物大集合</a>

      <div class="section stack">
        <label class="label" for="studentCount">班級人數</label>
        <input id="studentCount" type="number" min="1" max="80" value="28">
        <button id="applyCount" class="button primary" type="button">套用人數</button>
      </div>

      <div class="section row">
        <button id="addAll" class="button good" type="button">全班 +1</button>
        <button id="feedHungry" class="button" type="button">餵飽肚子餓</button>
      </div>

      <div class="section row">
        <button id="resetScores" class="button danger" type="button">分數歸零</button>
        <button id="resetAll" class="button danger" type="button">全部重置</button>
      </div>

      <div class="section">
        <span class="label">寵物成長分數</span>
        <ul class="stage-list">
          <li><span>🥚</span><span>神祕蛋</span><strong>0 分</strong></li>
          <li><span>🐣</span><span>幼幼獸</span><strong>5 分</strong></li>
          <li><span>🐾</span><span>小萌獸</span><strong>15 分</strong></li>
          <li><span>🌱</span><span>成長獸</span><strong>30 分</strong></li>
          <li><span>🌟</span><span>閃亮獸</span><strong>50 分</strong></li>
          <li><span>👑</span><span>守護獸</span><strong>80 分</strong></li>
        </ul>
      </div>
    </aside>

    <main class="main">
      <section class="stage" aria-live="polite">
        <h2 class="page-title">一起照顧學習寵物</h2>
        <div class="summary-bar">
          <div class="stat"><strong id="totalStudents">0</strong>學生數</div>
          <div class="stat"><strong id="maxedCount">0</strong>滿等寵物</div>
          <div class="stat"><strong id="hungryCount">0</strong>肚子餓</div>
          <div class="stat"><strong id="topScore">0</strong>最高分</div>
        </div>
        <div class="pet-grid" id="petGrid"></div>
        <section class="honor-board" id="honorBoard" aria-labelledby="honorTitle">
          <div class="section-heading">
            <h3 id="honorTitle">全班寵物大集合</h3>
            <p>依照分數排序展示全班成果，讓學生一眼看到自己的寵物目前進化到哪個階段。</p>
          </div>
          <div class="honor-grid" id="honorGrid"></div>
        </section>
      </section>
    </main>
  </div>

  <script>
    const studentCountInput = document.querySelector("#studentCount");
    const applyCount = document.querySelector("#applyCount");
    const addAll = document.querySelector("#addAll");
    const feedHungry = document.querySelector("#feedHungry");
    const resetScores = document.querySelector("#resetScores");
    const resetAll = document.querySelector("#resetAll");
    const totalStudents = document.querySelector("#totalStudents");
    const maxedCount = document.querySelector("#maxedCount");
    const hungryCount = document.querySelector("#hungryCount");
    const topScore = document.querySelector("#topScore");
    const petGrid = document.querySelector("#petGrid");
    const honorGrid = document.querySelector("#honorGrid");

    const storageKey = "jessie-toolbox-pet-scoreboard";
    const activityLogKey = "jessie-toolbox-activity-log";
    const teacherAccessKey = "jessie-toolbox-teacher-unlocked";
    const maxScore = 80;
    const stages = [
      { min: 0, name: "神祕蛋", icon: "🥚", scale: 0.72, details: 0 },
      { min: 5, name: "幼幼獸", icon: "🐣", scale: 0.82, details: 1 },
      { min: 15, name: "小萌獸", icon: "🐾", scale: 0.94, details: 2 },
      { min: 30, name: "成長獸", icon: "🌱", scale: 1.06, details: 3 },
      { min: 50, name: "閃亮獸", icon: "🌟", scale: 1.16, details: 4 },
      { min: 80, name: "守護獸", icon: "👑", scale: 1.26, details: 5 }
    ];
    const palettes = [
      ["#ff8fc7", "#fff1a8", "#7b4ed8"],
      ["#82dfc6", "#e4fff5", "#087352"],
      ["#9bd2ff", "#eef8ff", "#2453a6"],
      ["#ffd24a", "#fff7d1", "#8a5a00"],
      ["#c7b6ff", "#f2eeff", "#6040b5"],
      ["#ffad4d", "#fff0d8", "#a54f00"],
      ["#ff9a9e", "#fff0f3", "#b42334"],
      ["#7dd3fc", "#e0f7ff", "#075985"],
      ["#f0abfc", "#fdf4ff", "#86198f"],
      ["#a7f3d0", "#ecfdf5", "#047857"],
      ["#fde68a", "#fffbeb", "#92400e"],
      ["#93c5fd", "#eff6ff", "#1d4ed8"]
    ];
    const speciesNames = ["星糖", "雲朵", "泡泡", "布丁", "閃電", "月光", "果凍", "奶茶", "薄荷", "彩虹", "栗子", "珍珠"];

    let state = {
      studentCount: 28,
      pets: []
    };

    function variantFor(number, generation = 1) {
      const seed = (number * 37) + (generation * 101);
      return {
        palette: seed % palettes.length,
        body: seed % 5,
        ears: Math.floor(seed / 2) % 5,
        tail: Math.floor(seed / 3) % 5,
        extra: Math.floor(seed / 5) % 5,
        cheek: Math.floor(seed / 7) % 4,
        sprite: seed % 12,
        name: speciesNames[seed % speciesNames.length]
      };
    }

    function makePet(number) {
      return { number, score: 0, hungry: false, generation: 1, variant: variantFor(number, 1), retired: [] };
    }

    function syncPets() {
      const existing = new Map(state.pets.map((pet) => [pet.number, pet]));
      state.pets = Array.from({ length: state.studentCount }, (_, index) => {
        const pet = existing.get(index + 1) || makePet(index + 1);
        pet.generation ||= 1;
        pet.variant ||= variantFor(pet.number, pet.generation);
        pet.retired ||= [];
        return pet;
      });
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function logActivity(entry) {
      try {
        const logs = JSON.parse(localStorage.getItem(activityLogKey) || "[]");
        logs.push({
          id: crypto.randomUUID(),
          time: new Date().toISOString(),
          tool: "pet-scoreboard",
          ...entry
        });
        localStorage.setItem(activityLogKey, JSON.stringify(logs.slice(-1500)));
      } catch {
        localStorage.setItem(activityLogKey, "[]");
      }
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
        if (saved.studentCount && Array.isArray(saved.pets)) state = saved;
      } catch {
        localStorage.removeItem(storageKey);
      }
      syncPets();
    }

    function getStage(score) {
      return stages.reduce((best, stage) => score >= stage.min ? stage : best, stages[0]);
    }

    function getNextStage(score) {
      return stages.find((stage) => score < stage.min) || null;
    }

    function updatePet(number, delta) {
      if (!confirmTeacherAccess("修改個人寵物分數")) return;
      const before = state.pets.find((pet) => pet.number === number);
      state.pets = state.pets.map((pet) => {
        if (pet.number !== number) return pet;
        const nextScore = Math.max(0, Math.min(maxScore, pet.score + delta));
        return {
          ...pet,
          score: nextScore,
          hungry: delta < 0 ? true : (delta > 0 ? false : pet.hungry)
        };
      });
      const after = state.pets.find((pet) => pet.number === number);
      if (before && after && before.score !== after.score) {
        logActivity({
          category: "personal",
          subject: `${number} 號`,
          number,
          delta: after.score - before.score,
          before: before.score,
          after: after.score,
          note: after.hungry ? "寵物肚子餓" : "個人寵物積分"
        });
      }
      render();
    }

    function rebirth(number) {
      if (!confirmTeacherAccess("重新養一個寵物")) return;
      const before = state.pets.find((pet) => pet.number === number);
      state.pets = state.pets.map((pet) => {
        if (pet.number !== number) return pet;
        const nextGeneration = pet.generation + 1;
        const retired = [
          ...(pet.retired || []),
          {
            generation: pet.generation,
            variant: { ...ensureVariant(pet) }
          }
        ];
        return { ...pet, score: 0, hungry: false, generation: nextGeneration, variant: variantFor(number, nextGeneration), retired };
      });
      if (before) {
        logActivity({
          category: "personal",
          subject: `${number} 號`,
          number,
          delta: 0,
          before: before.score,
          after: 0,
          note: `第 ${before.generation} 代滿等收藏，開始新寵物`
        });
      }
      render();
    }

    function ensureVariant(pet) {
      if (!pet.variant) pet.variant = variantFor(pet.number, pet.generation || 1);
      if (!Number.isInteger(pet.variant.sprite)) {
        pet.variant.sprite = variantFor(pet.number, pet.generation || 1).sprite;
      }
      pet.retired ||= [];
      return pet.variant;
    }

    function atlasPosition(variant) {
      const sprite = Number.isInteger(variant.sprite) ? variant.sprite : 0;
      const slot = ((sprite % 12) + 12) % 12;
      const col = slot % 4;
      const row = Math.floor(slot / 4);
      return {
        x: `${(col * 100) / 3}%`,
        y: `${(row * 100) / 2}%`
      };
    }

    function petAtlasHtml(pet, stage, compact = false) {
      const variant = ensureVariant(pet);
      const pos = atlasPosition(variant);
      const maxed = pet.score >= maxScore;
      const mood = pet.hungry ? "🍽️" : (maxed ? "✨" : stage.icon);
      const scaleByStage = [0, 0.66, 0.82, 0.98, 1.08, 1.14];
      const stageClass = [
        "egg-stage",
        "hatch-stage",
        "atlas-stage",
        "grown-stage",
        "glow-stage",
        "guardian-stage"
      ][stage.details] || "atlas-stage";
      const scale = compact ? 1 : scaleByStage[stage.details];
      const frameClass = compact ? "pet-atlas-frame mini guardian-stage" : `pet-atlas-frame ${stageClass}`;
      const moodClass = compact ? "pet-mood mini" : "pet-mood";

      if (!compact && stage.details === 0) {
        return `
        <div class="${frameClass}" role="img" aria-label="${pet.number} 號的神祕蛋">
          <div class="pet-stage-glow"></div>
          <div class="pet-egg"></div>
          <span class="${moodClass}">${mood}</span>
        </div>`;
      }

      if (!compact && stage.details === 1) {
        return `
        <div class="${frameClass}" role="img" aria-label="${pet.number} 號的幼幼獸">
          <div class="pet-stage-glow"></div>
          <div class="pet-atlas" style="--atlas-x: ${pos.x}; --atlas-y: ${pos.y}; --pet-scale: ${scale};"></div>
          <div class="hatch-shell"></div>
          <span class="${moodClass}">${mood}</span>
        </div>`;
      }

      return `
        <div class="${frameClass}" role="img" aria-label="${pet.number} 號的圖鑑寵物">
          <div class="pet-stage-glow"></div>
          <div class="pet-atlas" style="--atlas-x: ${pos.x}; --atlas-y: ${pos.y}; --pet-scale: ${scale};"></div>
          <span class="${moodClass}">${mood}</span>
        </div>`;
    }

    function collectionHtml(pet) {
      const retired = pet.retired || [];
      if (!retired.length) return '<div class="collection-empty">滿等後會收藏在這裡</div>';
      return retired.map((oldPet) => {
        const miniPet = {
          number: pet.number,
          score: maxScore,
          hungry: false,
          generation: oldPet.generation,
          variant: oldPet.variant,
          retired: []
        };
        return petAtlasHtml(miniPet, stages[stages.length - 1], true);
      }).join("");
    }

    function svgPet(pet, stage, compact = false) {
      const variant = ensureVariant(pet);
      const [main, light, dark] = palettes[variant.palette];
      const isEgg = stage.details === 0;
      const isHungry = pet.hungry;
      const isMaxed = pet.score >= maxScore;
      const svgClass = compact ? "pet-svg mini" : "pet-svg";
      const bodyY = 90 - (stage.details * 2);
      const bodyRx = ([42, 47, 51, 55, 59][variant.body] || 49) + (stage.details * 1.6);
      const bodyRy = isEgg ? 50 : 47 + (stage.details * 2.4);
      const scale = stage.scale;
      const mouth = isHungry
        ? '<path d="M81 105 Q90 98 99 105" fill="none" stroke="#20304f" stroke-width="3.6" stroke-linecap="round"/><path d="M74 116 Q90 109 106 116" fill="none" stroke="#b45309" stroke-width="2.6" stroke-linecap="round" opacity="0.5"/>'
        : '<path d="M78 101 Q90 111 102 101" fill="none" stroke="#20304f" stroke-width="3.8" stroke-linecap="round"/><path d="M86 105 Q90 108 94 105" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.65"/>';
      const eyes = isHungry
        ? '<path d="M62 82 Q70 77 78 82 M102 82 Q110 77 118 82" stroke="#20304f" stroke-width="4" stroke-linecap="round" fill="none"/><circle cx="70" cy="89" r="2.5" fill="#94a3b8"/><circle cx="110" cy="89" r="2.5" fill="#94a3b8"/>'
        : '<g class="blink"><ellipse cx="70" cy="84" rx="9.5" ry="11" fill="url(#eyeGloss)"/><ellipse cx="110" cy="84" rx="9.5" ry="11" fill="url(#eyeGloss)"/><circle class="pupil" cx="70" cy="85" r="4.5" fill="#111827"/><circle class="pupil" cx="110" cy="85" r="4.5" fill="#111827"/><circle class="eye-shine" cx="66.8" cy="79.5" r="3" fill="#fff"/><circle class="eye-shine" cx="106.8" cy="79.5" r="3" fill="#fff"/></g>';
      const ears = [
        `<path class="ear" d="M54 52 Q46 16 74 39" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/><path class="ear" d="M126 52 Q134 16 106 39" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/>`,
        `<circle class="ear" cx="55" cy="44" r="19" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/><circle class="ear" cx="125" cy="44" r="19" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/>`,
        `<path class="ear" d="M58 52 L45 22 L80 39" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/><path class="ear" d="M122 52 L135 22 L100 39" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/>`,
        `<path class="ear" d="M62 50 C39 31 47 16 74 38" fill="${light}" stroke="#fff" stroke-width="7"/><path class="ear" d="M118 50 C141 31 133 16 106 38" fill="${light}" stroke="#fff" stroke-width="7"/>`,
        `<path class="ear" d="M62 51 Q62 17 84 40" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/><path class="ear" d="M118 51 Q118 17 96 40" fill="url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})" stroke="#fff" stroke-width="7"/>`
      ][variant.ears];
      const tails = [
        `<path class="tail" d="M132 102 Q168 92 146 66" fill="none" stroke="${dark}" stroke-width="13" stroke-linecap="round"/>`,
        `<circle class="tail" cx="145" cy="95" r="18" fill="${light}" stroke="#fff" stroke-width="6"/>`,
        `<path class="tail" d="M131 101 L161 86 L151 121 Z" fill="${main}" stroke="#fff" stroke-width="6"/>`,
        `<path class="tail" d="M132 103 C162 112 168 76 143 78" fill="none" stroke="${main}" stroke-width="12" stroke-linecap="round"/>`,
        `<path class="tail" d="M132 101 Q156 102 158 76 Q169 96 150 118" fill="${light}" stroke="#fff" stroke-width="6"/>`
      ][variant.tail];
      const extras = [
        `<circle cx="90" cy="54" r="8" fill="${dark}" opacity="0.9"/>`,
        `<path class="antenna" d="M82 53 L90 34 L98 53" fill="${dark}" stroke="#fff" stroke-width="4"/><circle class="spark" cx="90" cy="32" r="6" fill="#ffd24a" stroke="#fff" stroke-width="3"/>`,
        `<g class="wing"><path d="M43 92 Q18 72 39 57 Q49 70 50 91" fill="${light}" stroke="#fff" stroke-width="5"/><path d="M137 92 Q162 72 141 57 Q131 70 130 91" fill="${light}" stroke="#fff" stroke-width="5"/></g>`,
        `<path d="M74 57 Q90 43 106 57" fill="none" stroke="${dark}" stroke-width="6" stroke-linecap="round"/>`,
        `<circle class="spark" cx="126" cy="48" r="7" fill="#ffd24a"/><circle class="spark" cx="54" cy="59" r="5" fill="#ff8fc7"/>`
      ][variant.extra];
      const snout = `<ellipse cx="90" cy="99" rx="18" ry="13" fill="#fff" opacity="0.62"/><ellipse cx="90" cy="95" rx="4.5" ry="3.2" fill="${dark}" opacity="0.85"/>`;
      const foreheadTuft = [
        `<path d="M78 55 Q88 38 98 55" fill="${dark}" opacity="0.75"/>`,
        `<path d="M72 57 Q88 34 90 56 Q98 38 108 57" fill="${dark}" opacity="0.65"/>`,
        `<circle cx="90" cy="51" r="10" fill="${light}" stroke="#fff" stroke-width="4"/>`,
        `<path d="M76 56 C80 42 100 42 104 56" fill="${light}" stroke="#fff" stroke-width="4"/>`,
        `<path d="M82 55 L90 41 L98 55" fill="${dark}" stroke="#fff" stroke-width="3"/>`
      ][variant.body];
      const cheeks = variant.cheek === 0 ? "" : `<ellipse class="blush" cx="54" cy="98" rx="8" ry="5" fill="#ff8fc7"/><ellipse class="blush" cx="126" cy="98" rx="8" ry="5" fill="#ff8fc7"/>`;
      const crown = isMaxed ? '<path class="spark" d="M67 24 L78 43 L90 22 L102 43 L113 24 L110 50 L70 50 Z" fill="#ffd24a" stroke="#fff" stroke-width="5"/>' : "";
      const defs = `
        <defs>
          <radialGradient id="body-${pet.number}-${pet.generation}-${compact ? "m" : "b"}" cx="35%" cy="25%" r="70%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="20%" stop-color="${light}"/>
            <stop offset="58%" stop-color="${main}"/>
            <stop offset="100%" stop-color="${main}"/>
          </radialGradient>
          <linearGradient id="belly-${pet.number}-${pet.generation}-${compact ? "m" : "b"}" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
            <stop offset="100%" stop-color="${light}" stop-opacity="0.68"/>
          </linearGradient>
          <radialGradient id="eyeGloss" cx="35%" cy="25%" r="70%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="22%" stop-color="#64748b"/>
            <stop offset="100%" stop-color="#111827"/>
          </radialGradient>
        </defs>`;
      const bodyFill = `url(#body-${pet.number}-${pet.generation}-${compact ? "m" : "b"})`;
      const bellyFill = `url(#belly-${pet.number}-${pet.generation}-${compact ? "m" : "b"})`;

      if (isEgg) {
        return `
          <svg class="${svgClass}" viewBox="0 0 180 160" role="img" aria-label="${pet.number} 號神祕蛋">
            ${defs}
            <ellipse cx="90" cy="93" rx="45" ry="54" fill="${bodyFill}" stroke="#fff" stroke-width="7"/>
            <path d="M54 95 Q66 82 78 96 T102 96 T126 93" fill="none" stroke="${light}" stroke-width="9" stroke-linecap="round"/>
            <ellipse cx="73" cy="65" rx="14" ry="9" fill="#fff" opacity="0.74"/><circle cx="105" cy="116" r="6" fill="${light}"/>
            <ellipse cx="90" cy="145" rx="44" ry="10" fill="rgba(36,48,71,0.12)"/>
          </svg>`;
      }

      return `
        <svg class="${svgClass}" viewBox="0 0 180 160" role="img" aria-label="${pet.number} 號${variant.name}${stage.name}">
          ${defs}
          <ellipse cx="90" cy="146" rx="54" ry="10" fill="rgba(36,48,71,0.12)"/>
          ${crown}
          ${stage.details >= 2 ? tails : ""}
          ${ears}
          ${stage.details >= 3 ? extras : ""}
          <g transform="translate(90 88) scale(${scale}) translate(-90 -88)">
            <ellipse cx="90" cy="${bodyY}" rx="${bodyRx}" ry="${bodyRy}" fill="${bodyFill}" stroke="#fff" stroke-width="7"/>
            <ellipse cx="72" cy="${bodyY - 25}" rx="${bodyRx * 0.26}" ry="${bodyRy * 0.16}" fill="#fff" opacity="0.46"/>
            <ellipse cx="90" cy="${bodyY + 20}" rx="${bodyRx * 0.46}" ry="${bodyRy * 0.28}" fill="${bellyFill}" opacity="0.9"/>
            <path class="arm" d="M52 98 Q36 105 41 121" fill="none" stroke="${dark}" stroke-width="9" stroke-linecap="round"/>
            <path class="arm" d="M128 98 Q144 105 139 121" fill="none" stroke="${dark}" stroke-width="9" stroke-linecap="round"/>
            ${stage.details >= 2 ? foreheadTuft : ""}
            ${eyes}
            ${cheeks}
            ${snout}
            ${mouth}
            <ellipse cx="66" cy="126" rx="13" ry="8" fill="${dark}" opacity="0.9"/>
            <ellipse cx="114" cy="126" rx="13" ry="8" fill="${dark}" opacity="0.9"/>
            <circle cx="62" cy="123" r="2.4" fill="#fff" opacity="0.55"/><circle cx="110" cy="123" r="2.4" fill="#fff" opacity="0.55"/>
          </g>
          ${isHungry ? '<text x="90" y="30" text-anchor="middle" font-size="20">🍽️</text>' : ""}
        </svg>`;
    }

    function renderStats() {
      const maxed = state.pets.filter((pet) => pet.score >= maxScore).length;
      const hungry = state.pets.filter((pet) => pet.hungry).length;
      const top = state.pets.reduce((best, pet) => Math.max(best, pet.score), 0);
      totalStudents.textContent = state.studentCount;
      maxedCount.textContent = maxed;
      hungryCount.textContent = hungry;
      topScore.textContent = top;
    }

    function renderPets() {
      petGrid.innerHTML = "";
      state.pets.forEach((pet) => {
        const stage = getStage(pet.score);
        const progress = Math.min(pet.score / maxScore, 1);
        const variant = ensureVariant(pet);
        const card = document.createElement("article");
        card.className = `pet-card ${pet.hungry ? "hungry" : ""} ${pet.score >= maxScore ? "maxed" : ""}`;
        card.style.setProperty("--progress", progress);
        card.innerHTML = `
          <div class="card-top">
            <span class="student-no">${pet.number} 號</span>
            <span class="stage-name">${stage.icon} ${variant.name}${stage.name} · 第 ${pet.generation} 代</span>
          </div>
          <div class="collection">
            <div class="collection-title">已養大的守護獸</div>
            <div class="collection-list">${collectionHtml(pet)}</div>
          </div>
          <div class="pet-yard">
            ${petAtlasHtml(pet, stage)}
          </div>
          <div class="score-row">
            <span>分數</span>
            <div class="progress-wrap"><div class="progress"></div></div>
            <span class="score">${pet.score}</span>
          </div>
          <div class="actions">
            <button class="button danger" data-delta="-5" type="button">-5</button>
            <button class="button danger" data-delta="-1" type="button">-1</button>
            <button class="button good" data-delta="1" type="button">+1</button>
            <button class="button good" data-delta="5" type="button">+5</button>
            <button class="button good" data-delta="10" type="button">+10</button>
            <button class="button" data-feed="true" type="button">餵食</button>
            <button class="button primary rebirth" data-rebirth="true" type="button">滿等，重新養一個</button>
          </div>
        `;

        card.querySelectorAll("[data-delta]").forEach((button) => {
          button.addEventListener("click", () => updatePet(pet.number, Number(button.dataset.delta)));
        });
        card.querySelector("[data-feed]").addEventListener("click", () => updatePet(pet.number, 1));
        card.querySelector("[data-rebirth]").addEventListener("click", () => rebirth(pet.number));
        petGrid.appendChild(card);
      });
    }

    function renderHonorBoard() {
      honorGrid.innerHTML = "";
      const rankedPets = [...state.pets].sort((a, b) => {
        const retiredDiff = (b.retired || []).length - (a.retired || []).length;
        if (retiredDiff !== 0) return retiredDiff;
        return b.score - a.score || a.number - b.number;
      });

      rankedPets.forEach((pet, index) => {
        const stage = getStage(pet.score);
        const nextStage = getNextStage(pet.score);
        const variant = ensureVariant(pet);
        const retiredCount = (pet.retired || []).length;
        const note = nextStage
          ? `再 ${nextStage.min - pet.score} 分進化`
          : "已成為守護獸";
        const card = document.createElement("article");
        card.className = `honor-card ${pet.score >= maxScore ? "maxed" : ""}`;
        card.innerHTML = `
          <span class="rank-badge">#${index + 1}</span>
          <div class="honor-top">
            <div class="honor-name">${pet.number} 號</div>
            <div class="honor-stage">${stage.icon} ${variant.name}${stage.name} · 第 ${pet.generation} 代</div>
          </div>
          <div class="honor-yard">
            ${petAtlasHtml(pet, stage)}
          </div>
          <div class="honor-meta">
            <span>目前分數 <strong>${pet.score}</strong></span>
            <span>已收藏守護獸 <strong>${retiredCount}</strong></span>
            <span class="evolution-note">${note}</span>
          </div>
        `;
        honorGrid.appendChild(card);
      });
    }

    function render() {
      studentCountInput.value = state.studentCount;
      renderStats();
      renderPets();
      renderHonorBoard();
      saveState();
    }

    function confirmTeacherAction(actionName) {
      if (sessionStorage.getItem(teacherAccessKey) === "true") return true;
      window.alert(`教師後台尚未解鎖，無法執行「${actionName}」。請先到教師控制後台輸入密碼。`);
      return false;
    }

    function confirmTeacherAccess(actionName) {
      return confirmTeacherAction(actionName);
    }

    applyCount.addEventListener("click", () => {
      if (!confirmTeacherAccess("套用班級人數")) return;
      state.studentCount = Math.min(Math.max(Number(studentCountInput.value) || 1, 1), 80);
      syncPets();
      render();
    });

    addAll.addEventListener("click", () => {
      if (!confirmTeacherAccess("全班加分")) return;
      state.pets = state.pets.map((pet) => {
        const nextScore = Math.min(maxScore, pet.score + 1);
        if (nextScore !== pet.score) {
          logActivity({
            category: "personal",
            subject: `${pet.number} 號`,
            number: pet.number,
            delta: nextScore - pet.score,
            before: pet.score,
            after: nextScore,
            note: "全班 +1"
          });
        }
        return { ...pet, score: nextScore, hungry: false };
      });
      render();
    });

    feedHungry.addEventListener("click", () => {
      if (!confirmTeacherAccess("餵飽肚子餓")) return;
      state.pets = state.pets.map((pet) => {
        if (!pet.hungry) return pet;
        const nextScore = Math.min(maxScore, pet.score + 1);
        if (nextScore !== pet.score) {
          logActivity({
            category: "personal",
            subject: `${pet.number} 號`,
            number: pet.number,
            delta: nextScore - pet.score,
            before: pet.score,
            after: nextScore,
            note: "餵飽肚子餓"
          });
        }
        return { ...pet, score: nextScore, hungry: false };
      });
      render();
    });

    resetScores.addEventListener("click", () => {
      if (!confirmTeacherAction("分數歸零")) return;
      state.pets = state.pets.map((pet) => ({ ...pet, score: 0, hungry: false }));
      render();
    });

    resetAll.addEventListener("click", () => {
      if (!confirmTeacherAction("全部重置")) return;
      localStorage.removeItem(storageKey);
      state = { studentCount: 28, pets: [] };
      syncPets();
      render();
    });

    loadState();
    render();
  </script>
</body>
</html>
