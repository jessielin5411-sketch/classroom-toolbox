<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>聯絡簿大黑板</title>
  <style>
    :root {
      --ink: #243047;
      --muted: #65758f;
      --paper: #f7fbff;
      --panel: #ffffff;
      --blue: #4f8cff;
      --green: #22b98f;
      --yellow: #ffd24a;
      --orange: #ffad4d;
      --red: #ff5d73;
      --purple: #7b4ed8;
      --line: rgba(36, 48, 71, 0.14);
      --shadow: 0 18px 44px rgba(36, 48, 71, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 12%, rgba(255, 210, 74, 0.36), transparent 24%),
        radial-gradient(circle at 92% 14%, rgba(79, 140, 255, 0.22), transparent 24%),
        linear-gradient(180deg, #fff8fb, var(--paper));
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }

    .page {
      width: min(1440px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .back-link {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--purple);
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(420px, 1fr) 360px;
      gap: 14px;
      align-items: stretch;
    }

    .panel {
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .side,
    .quick-panel {
      padding: 16px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .event-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      background: #ecf3ff;
      border: 1px solid rgba(79, 140, 255, 0.18);
      margin-bottom: 10px;
    }

    .event-card.urgent {
      background: #fff0e6;
      border-color: rgba(255, 93, 115, 0.35);
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 93, 115, 0); }
      50% { box-shadow: 0 0 0 6px rgba(255, 93, 115, 0.12); }
    }

    .event-card strong {
      font-size: 18px;
    }

    .event-card span {
      color: var(--muted);
      font-weight: 800;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    input, select, textarea {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }

    input, select {
      min-height: 42px;
      padding: 0 10px;
    }

    textarea {
      min-height: 108px;
      padding: 10px;
      resize: vertical;
      line-height: 1.55;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .day-button {
      position: relative;
      min-height: 72px;
      padding: 8px;
      border: 2px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      text-align: left;
      font-weight: 900;
    }

    .day-button.active {
      border-color: var(--blue);
      background: #ecf3ff;
    }

    .day-button .weekday {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 185, 143, 0.16);
    }

    .board-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .board-toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.16);
      background: #263248;
      color: #fff;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-button,
    .quick-button,
    .save-button {
      min-height: 44px;
      padding: 0 14px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 950;
    }

    .tool-button {
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
    }

    .save-button {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--purple));
    }

    .blackboard {
      min-height: 680px;
      padding: clamp(18px, 3vw, 34px);
      color: #f8fff2;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 32%),
        #163d32;
      overflow: auto;
    }

    .date-line {
      margin: 0 0 22px;
      color: #b9f5df;
      font-size: clamp(20px, 2.6vw, 34px);
      font-weight: 950;
    }

    .board-content {
      display: grid;
      gap: 20px;
    }

    .board-section h2 {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
      padding-bottom: 6px;
      border-bottom: 3px solid rgba(255, 210, 74, 0.88);
      font-size: clamp(24px, 3.2vw, 42px);
    }

    .board-section ul {
      margin: 0;
      padding-left: 1.4em;
      font-size: clamp(26px, 3.8vw, 52px);
      line-height: 1.42;
      font-weight: 900;
    }

    .board-section li {
      margin: 0.1em 0;
    }

    .blackboard.vertical .board-content {
      min-height: 560px;
      display: flex;
      flex-direction: row-reverse;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 28px;
      writing-mode: vertical-rl;
    }

    .blackboard.vertical .date-line {
      writing-mode: horizontal-tb;
    }

    .blackboard.vertical .board-section h2 {
      border-bottom: 0;
      border-left: 3px solid rgba(255, 210, 74, 0.88);
      padding: 0 0 0 8px;
      margin: 0 0 0 10px;
    }

    .blackboard.vertical .board-section ul {
      padding-left: 0;
      padding-top: 1em;
    }

    .editor-stack {
      display: grid;
      gap: 12px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0 16px;
    }

    .quick-button {
      min-height: 48px;
      padding: 12px 14px;
      color: var(--ink);
      background: var(--quick-bg);
      border: 1px solid rgba(36, 48, 71, 0.08);
      text-align: left;
    }

    .status {
      min-height: 24px;
      color: var(--purple);
      font-weight: 900;
    }

    .board-panel:fullscreen {
      width: 100vw;
      height: 100vh;
      background: #163d32;
    }

    .board-panel:fullscreen .blackboard {
      min-height: calc(100vh - 72px);
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .calendar {
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .blackboard {
        min-height: 560px;
      }
    }

    @media (max-width: 700px) {
      .calendar,
      .quick-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="back-link" href="../index.html">← 回工具箱首頁</a>
      <h1>聯絡簿大黑板</h1>
    </header>

    <main class="layout">
      <aside class="panel side">
        <h2 class="section-title">倒數提醒</h2>
        <div id="eventCards"></div>
        <label>
          事件名稱
          <input id="eventTitle" type="text" placeholder="例如：期末考">
        </label>
        <label>
          事件日期
          <input id="eventDate" type="date">
        </label>
        <div style="height: 12px"></div>
        <button class="save-button" id="saveEvent" type="button">儲存倒數事件</button>

        <div style="height: 22px"></div>
        <h2 class="section-title">雙週快捷日曆</h2>
        <div class="calendar" id="calendarGrid"></div>
      </aside>

      <section class="panel board-panel" id="boardPanel" aria-labelledby="boardTitle">
        <div class="board-toolbar">
          <strong id="boardTitle">今日聯絡事項</strong>
          <div class="toolbar-actions">
            <button class="tool-button" id="toggleWriting" type="button">🔄 直排</button>
            <button class="tool-button" id="fullscreenButton" type="button">🔍 全螢幕</button>
          </div>
        </div>
        <div class="blackboard" id="blackboard">
          <p class="date-line" id="selectedDateText"></p>
          <div class="board-content" id="boardContent"></div>
        </div>
      </section>

      <aside class="panel quick-panel">
        <h2 class="section-title">快捷作業區</h2>
        <label>
          插入到
          <select id="targetCategory">
            <option value="homework">今日作業</option>
            <option value="items">準備物品</option>
            <option value="notice">重要宣導</option>
          </select>
        </label>
        <div class="quick-grid" id="quickGrid"></div>

        <div class="editor-stack">
          <label>
            今日作業
            <textarea id="homeworkText" data-category="homework"></textarea>
          </label>
          <label>
            準備物品
            <textarea id="itemsText" data-category="items"></textarea>
          </label>
          <label>
            重要宣導
            <textarea id="noticeText" data-category="notice"></textarea>
          </label>
          <button class="save-button" id="saveContent" type="button">儲存並更新黑板</button>
          <div class="status" id="statusText"></div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const storageKey = "jessie-toolbox-contact-book";
    const eventCards = document.querySelector("#eventCards");
    const eventTitle = document.querySelector("#eventTitle");
    const eventDate = document.querySelector("#eventDate");
    const saveEvent = document.querySelector("#saveEvent");
    const calendarGrid = document.querySelector("#calendarGrid");
    const boardPanel = document.querySelector("#boardPanel");
    const blackboard = document.querySelector("#blackboard");
    const selectedDateText = document.querySelector("#selectedDateText");
    const boardContent = document.querySelector("#boardContent");
    const toggleWriting = document.querySelector("#toggleWriting");
    const fullscreenButton = document.querySelector("#fullscreenButton");
    const targetCategory = document.querySelector("#targetCategory");
    const quickGrid = document.querySelector("#quickGrid");
    const homeworkText = document.querySelector("#homeworkText");
    const itemsText = document.querySelector("#itemsText");
    const noticeText = document.querySelector("#noticeText");
    const saveContent = document.querySelector("#saveContent");
    const statusText = document.querySelector("#statusText");

    const quickButtons = [
      { label: "國習", text: "▶ 國習第  頁", bg: "#e8f3ff" },
      { label: "甲本", text: "▶ 甲本第  頁", bg: "#e9fff7" },
      { label: "乙本", text: "▶ 乙本第  頁", bg: "#e9fff7" },
      { label: "直行本", text: "▶ 直行本第  頁", bg: "#e8f3ff" },
      { label: "數習", text: "▶ 數習第  頁", bg: "#fff7d1" },
      { label: "數作", text: "▶ 數作第  頁", bg: "#fff0dc" },
      { label: "帶", text: "▶ 帶", bg: "#f1f5f9" },
      { label: "簽名", text: "▶ 簽名", bg: "#fff0f3" }
    ];

    const categoryLabels = {
      homework: "今日作業",
      items: "準備物品",
      notice: "重要宣導"
    };

    const categoryIcons = {
      homework: "✏️",
      items: "🎒",
      notice: "📣"
    };

    let selectedDate = toDateKey(new Date());
    let writingMode = "horizontal";
    let state = loadState();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
        return {
          entries: saved.entries || {},
          events: Array.isArray(saved.events) ? saved.events : defaultEvents()
        };
      } catch {
        return { entries: {}, events: defaultEvents() };
      }
    }

    function defaultEvents() {
      const exam = new Date();
      exam.setDate(exam.getDate() + 12);
      return [{ title: "期末考", date: toDateKey(exam) }];
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function toDateKey(date) {
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 10);
    }

    function parseKey(key) {
      return new Date(`${key}T00:00:00`);
    }

    function formatDate(key) {
      const date = parseKey(key);
      return `${date.getMonth() + 1}/${date.getDate()}（${"日一二三四五六"[date.getDay()]}）`;
    }

    function currentEntry() {
      if (!state.entries[selectedDate]) {
        state.entries[selectedDate] = { homework: "", items: "", notice: "" };
      }
      return state.entries[selectedDate];
    }

    function hasContent(key) {
      const entry = state.entries[key];
      return !!entry && Object.values(entry).some((value) => value.trim());
    }

    function renderEvents() {
      eventCards.innerHTML = "";
      const today = parseKey(toDateKey(new Date()));
      state.events.slice(0, 2).forEach((event) => {
        const target = parseKey(event.date);
        const days = Math.ceil((target - today) / 86400000);
        const card = document.createElement("article");
        card.className = `event-card ${days <= 3 && days >= 0 ? "urgent" : ""}`;
        card.innerHTML = `
          <strong>📅 距離【${event.title || "重要事件"}】還有 ${Math.max(0, days)} 天</strong>
          <span>${event.date || ""}</span>
        `;
        eventCards.appendChild(card);
      });
      const first = state.events[0] || {};
      eventTitle.value = first.title || "";
      eventDate.value = first.date || "";
    }

    function renderCalendar() {
      calendarGrid.innerHTML = "";
      const start = new Date();
      start.setDate(start.getDate() - 3);
      for (let index = 0; index < 14; index += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        const key = toDateKey(date);
        const button = document.createElement("button");
        button.className = `day-button ${key === selectedDate ? "active" : ""}`;
        button.type = "button";
        button.innerHTML = `
          <span>${date.getMonth() + 1}/${date.getDate()}</span>
          <span class="weekday">${"日一二三四五六"[date.getDay()]}</span>
          ${hasContent(key) ? '<span class="dot" aria-label="已有內容"></span>' : ""}
        `;
        button.addEventListener("click", () => {
          selectedDate = key;
          loadEntryToEditors();
          render();
        });
        calendarGrid.appendChild(button);
      }
    }

    function lines(text) {
      return text.split(/\n+/).map((line) => line.trim()).filter(Boolean);
    }

    function renderBoard() {
      const entry = currentEntry();
      selectedDateText.textContent = `${formatDate(selectedDate)} 聯絡事項`;
      blackboard.classList.toggle("vertical", writingMode === "vertical");
      boardContent.innerHTML = "";
      Object.keys(categoryLabels).forEach((key) => {
        const section = document.createElement("section");
        section.className = "board-section";
        const items = lines(entry[key]);
        section.innerHTML = `
          <h2>${categoryIcons[key]} ${categoryLabels[key]}</h2>
          <ul>${items.length ? items.map((item) => `<li>${item.replace(/^▶\s*/, "")}</li>`).join("") : "<li>今天尚未填寫</li>"}</ul>
        `;
        boardContent.appendChild(section);
      });
      toggleWriting.textContent = writingMode === "vertical" ? "🔄 橫排" : "🔄 直排";
    }

    function loadEntryToEditors() {
      const entry = currentEntry();
      homeworkText.value = entry.homework || "";
      itemsText.value = entry.items || "";
      noticeText.value = entry.notice || "";
      statusText.textContent = `已切換到 ${formatDate(selectedDate)}`;
    }

    function saveEditors() {
      state.entries[selectedDate] = {
        homework: homeworkText.value,
        items: itemsText.value,
        notice: noticeText.value
      };
      saveState();
      statusText.textContent = "已儲存並更新黑板。";
      render();
    }

    function renderQuickButtons() {
      quickGrid.innerHTML = "";
      quickButtons.forEach((item) => {
        const button = document.createElement("button");
        button.className = "quick-button";
        button.type = "button";
        button.style.setProperty("--quick-bg", item.bg);
        button.textContent = item.label;
        button.addEventListener("click", () => insertQuickText(item.text));
        quickGrid.appendChild(button);
      });
    }

    function editorByCategory(category) {
      return { homework: homeworkText, items: itemsText, notice: noticeText }[category];
    }

    function insertQuickText(text) {
      const editor = editorByCategory(targetCategory.value);
      const prefix = editor.value.trim() ? "\n" : "";
      editor.value += `${prefix}${text}`;
      editor.focus();
      editor.selectionStart = editor.selectionEnd = editor.value.length;
      saveEditors();
    }

    function saveCountdownEvent() {
      const title = eventTitle.value.trim();
      const date = eventDate.value;
      if (!title || !date) {
        statusText.textContent = "請先輸入事件名稱與日期。";
        return;
      }
      state.events = [{ title, date }, ...state.events.slice(1)].slice(0, 2);
      saveState();
      renderEvents();
      statusText.textContent = "已儲存倒數事件。";
    }

    function render() {
      renderEvents();
      renderCalendar();
      renderBoard();
    }

    saveContent.addEventListener("click", saveEditors);
    [homeworkText, itemsText, noticeText].forEach((editor) => {
      editor.addEventListener("blur", saveEditors);
    });
    saveEvent.addEventListener("click", saveCountdownEvent);
    toggleWriting.addEventListener("click", () => {
      writingMode = writingMode === "vertical" ? "horizontal" : "vertical";
      renderBoard();
    });
    fullscreenButton.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await boardPanel.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    renderQuickButtons();
    loadEntryToEditors();
    render();
  </script>
</body>
</html>
