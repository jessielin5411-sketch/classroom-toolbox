<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智慧聯絡簿</title>
  <style>
    :root {
      --ink: #eaf2ff;
      --muted: #94a8c6;
      --deep: #0f1726;
      --rail: #151d2c;
      --rail-2: #101827;
      --panel: #182437;
      --panel-2: #20304a;
      --line: rgba(148, 168, 198, 0.24);
      --purple: #635bff;
      --blue: #4f8cff;
      --green: #22b98f;
      --yellow: #ffe94d;
      --red: #ff5d73;
      --pink: #ff8fc7;
      --orange: #ffad4d;
      --chalk: #f7fff5;
      --chalk-soft: rgba(247, 255, 245, 0.62);
      --chalk-font: "Comic Sans MS", "DFKai-SB", "KaiTi", "Microsoft JhengHei", cursive;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background: #080b10;
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      background: #07090d;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: #111827;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 240px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #28236f;
      color: #b9c4ff;
      font-size: 22px;
    }

    .brand h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.1;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .select,
    .icon-button,
    .back-link {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #1a2638;
      font-weight: 850;
    }

    .select {
      padding: 0 10px;
    }

    .icon-button,
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      cursor: pointer;
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      min-height: calc(100vh - 56px);
    }

    .left-rail,
    .right-rail {
      background: var(--rail);
      border-color: var(--line);
      overflow: auto;
    }

    .left-rail {
      border-right: 1px solid var(--line);
    }

    .right-rail {
      border-left: 1px solid var(--line);
    }

    .rail-section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .rail-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 12px;
      font-size: 15px;
      color: #dce8ff;
    }

    .countdown-list {
      display: grid;
      gap: 8px;
    }

    .event-card {
      display: grid;
      gap: 4px;
      padding: 11px 12px;
      border: 1px solid #334762;
      border-radius: 8px;
      background: #1e2b40;
    }

    .event-card.urgent {
      border-color: rgba(255, 93, 115, 0.8);
      background: #4b1830;
      animation: alertPulse 1.1s ease-in-out infinite;
    }

    @keyframes alertPulse {
      50% { box-shadow: 0 0 0 5px rgba(255, 93, 115, 0.16); }
    }

    .event-card strong {
      color: #fff;
      font-size: 15px;
    }

    .event-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      margin-bottom: 10px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #334762;
      border-radius: 8px;
      color: #fff;
      background: #1d2a3e;
      font-weight: 850;
    }

    input,
    select {
      min-height: 38px;
      padding: 0 10px;
    }

    textarea {
      min-height: 100px;
      padding: 10px;
      resize: vertical;
      line-height: 1.55;
    }

    .primary-button {
      width: 100%;
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      cursor: pointer;
      font-weight: 950;
    }

    .month-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: #fff;
      font-weight: 950;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 7px;
    }

    .week-head,
    .day-button {
      min-height: 31px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: #b8cef2;
      font-weight: 850;
    }

    .week-head {
      color: #7f91ad;
      font-size: 12px;
    }

    .day-button {
      position: relative;
      cursor: pointer;
      font-size: 13px;
    }

    .day-button.active {
      color: #fff;
      background: var(--purple);
    }

    .day-button .dot {
      position: absolute;
      right: 3px;
      top: 3px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    .history-item {
      width: 100%;
      min-height: 48px;
      margin-bottom: 8px;
      padding: 0 14px;
      border: 1px solid #4f46e5;
      border-radius: 10px;
      text-align: left;
      color: #d8dcff;
      background: #241e5a;
      cursor: pointer;
      font-weight: 900;
    }

    .stage {
      display: grid;
      place-items: center;
      padding: 32px;
      background: #05070b;
      overflow: auto;
    }

    .blackboard {
      position: relative;
      width: min(100%, 1210px);
      min-height: min(76vh, 760px);
      padding: clamp(34px, 4vw, 54px);
      border-radius: 16px;
      color: var(--chalk);
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.055) 1px, transparent 1.5px) 0 0 / 24px 24px,
        linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 36%),
        #204f42;
      font-family: var(--chalk-font);
      box-shadow:
        inset 0 -16px 0 rgba(0, 0, 0, 0.16),
        0 22px 60px rgba(0, 0, 0, 0.4);
    }

    .blackboard::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -13px;
      height: 18px;
      border-radius: 0 0 12px 12px;
      background: linear-gradient(180deg, #c3a47a, #71593a);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.34);
    }

    .chalks {
      position: absolute;
      left: 50%;
      bottom: -18px;
      display: flex;
      gap: 12px;
      transform: translateX(-50%);
      z-index: 2;
    }

    .chalk {
      width: 34px;
      height: 5px;
      border-radius: 999px;
      background: var(--chalk-color);
    }

    .date-line {
      margin: 0 0 32px;
      color: var(--yellow);
      font-size: clamp(32px, 4vw, 44px);
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
    }

    .board-list {
      margin: 0;
      padding: 0 8% 0 4%;
      list-style: none;
      display: grid;
      gap: 28px;
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 900;
      line-height: 1.35;
    }

    .board-list li {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      align-items: baseline;
      border-bottom: 1px solid rgba(247, 255, 245, 0.15);
      padding-bottom: 12px;
    }

    .item-number {
      color: rgba(247, 255, 245, 0.62);
      text-align: right;
    }

    .item-text.notice {
      color: #ffd3de;
    }

    .item-text.items {
      color: #d8f5ff;
    }

    .empty-line {
      color: rgba(247, 255, 245, 0.32);
    }

    .blackboard.vertical {
      display: flex;
      flex-direction: row-reverse;
      align-items: flex-start;
      gap: clamp(42px, 6vw, 86px);
      min-height: min(76vh, 760px);
      padding-right: clamp(44px, 5vw, 72px);
    }

    .blackboard.vertical .date-line {
      writing-mode: vertical-rl;
      margin: 0;
      min-height: 430px;
      font-size: clamp(31px, 3.8vw, 44px);
      line-height: 1.55;
    }

    .blackboard.vertical .board-list {
      display: flex;
      flex-direction: row-reverse;
      align-items: flex-start;
      gap: clamp(36px, 5vw, 72px);
      padding: 34px 0 0;
      font-size: clamp(30px, 3.4vw, 44px);
    }

    .blackboard.vertical .board-list li {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-height: 430px;
      border-bottom: 0;
      padding: 0;
      writing-mode: vertical-rl;
    }

    .blackboard.vertical .item-number {
      text-align: center;
      writing-mode: horizontal-tb;
    }

    .right-head {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      color: #fff;
      font-weight: 950;
      background: #13203a;
    }

    .quick-list {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .quick-button {
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid #334762;
      border-radius: 10px;
      color: #fff;
      background: #1e2b40;
      cursor: pointer;
      font-weight: 900;
      text-align: left;
    }

    .quick-button.alert {
      color: #fff;
      border-color: #ff0f62;
      background: #4b1230;
    }

    .editor-block {
      padding: 0 14px 16px;
    }

    .status {
      min-height: 24px;
      padding: 0 14px 14px;
      color: #b9c4ff;
      font-weight: 850;
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .left-rail,
      .right-rail {
        border: 0;
      }

      .stage {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="../index.html" aria-label="回首頁">
        <span class="brand-mark">📖</span>
        <span>
          <h1>智慧聯絡簿</h1>
          <span>聯絡事項、作業與倒數提醒</span>
        </span>
      </a>
      <div class="top-actions">
        <select class="select" id="viewMode">
          <option value="horizontal">橫排顯示</option>
          <option value="vertical">直排顯示</option>
        </select>
        <button class="icon-button" id="fullscreenButton" type="button">大屏投影模式</button>
        <button class="icon-button" id="copyButton" type="button">輸出</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="left-rail">
        <section class="rail-section">
          <h2 class="rail-title">倒數事件</h2>
          <div class="countdown-list" id="eventCards"></div>
          <label>
            事件名稱
            <input id="eventTitle" type="text" placeholder="期末考、校外教學">
          </label>
          <label>
            事件日期
            <input id="eventDate" type="date">
          </label>
          <button class="primary-button" id="saveEvent" type="button">新增倒數</button>
        </section>

        <section class="rail-section">
          <div class="month-title">
            <span id="monthTitle"></span>
            <span>近 14 天</span>
          </div>
          <div class="calendar" id="calendarGrid"></div>
        </section>

        <section class="rail-section">
          <h2 class="rail-title">歷史紀錄</h2>
          <div id="historyList"></div>
        </section>
      </aside>

      <section class="stage">
        <article class="blackboard" id="blackboard" aria-live="polite">
          <p class="date-line" id="selectedDateText"></p>
          <ol class="board-list" id="boardList"></ol>
          <div class="chalks" aria-hidden="true">
            <span class="chalk" style="--chalk-color: #fff"></span>
            <span class="chalk" style="--chalk-color: #ffe94d"></span>
            <span class="chalk" style="--chalk-color: #ff8fc7"></span>
            <span class="chalk" style="--chalk-color: #8bd7ff"></span>
          </div>
        </article>
      </section>

      <aside class="right-rail">
        <div class="right-head">
          <span>快速插入面板</span>
          <button class="icon-button" id="saveContent" type="button">儲存</button>
        </div>
        <div class="quick-list" id="quickList"></div>
        <div class="editor-block">
          <label>
            插入到
            <select id="targetCategory">
              <option value="homework">今日作業</option>
              <option value="items">準備物品</option>
              <option value="notice">重要宣導</option>
            </select>
          </label>
          <label>
            今日作業
            <textarea id="homeworkText"></textarea>
          </label>
          <label>
            準備物品
            <textarea id="itemsText"></textarea>
          </label>
          <label>
            重要宣導
            <textarea id="noticeText"></textarea>
          </label>
        </div>
        <div class="status" id="statusText"></div>
      </aside>
    </main>
  </div>

  <script>
    const storageKey = "jessie-toolbox-contact-book";
    const blackboard = document.querySelector("#blackboard");
    const boardList = document.querySelector("#boardList");
    const selectedDateText = document.querySelector("#selectedDateText");
    const viewMode = document.querySelector("#viewMode");
    const fullscreenButton = document.querySelector("#fullscreenButton");
    const copyButton = document.querySelector("#copyButton");
    const eventCards = document.querySelector("#eventCards");
    const eventTitle = document.querySelector("#eventTitle");
    const eventDate = document.querySelector("#eventDate");
    const saveEvent = document.querySelector("#saveEvent");
    const monthTitle = document.querySelector("#monthTitle");
    const calendarGrid = document.querySelector("#calendarGrid");
    const historyList = document.querySelector("#historyList");
    const quickList = document.querySelector("#quickList");
    const targetCategory = document.querySelector("#targetCategory");
    const homeworkText = document.querySelector("#homeworkText");
    const itemsText = document.querySelector("#itemsText");
    const noticeText = document.querySelector("#noticeText");
    const saveContent = document.querySelector("#saveContent");
    const statusText = document.querySelector("#statusText");

    const quickButtons = [
      { label: "國習 P.～P.", text: "國習 P. ～ P.", category: "homework" },
      { label: "甲本 P.～P.", text: "甲本 P. ～ P.", category: "homework" },
      { label: "乙本 P.～P.", text: "乙本 P. ～ P.", category: "homework" },
      { label: "社習 P.～P.", text: "社習 P. ～ P.", category: "homework" },
      { label: "自習 P.～P.", text: "自習 P. ～ P.", category: "homework" },
      { label: "數習 P.～P.", text: "數習 P. ～ P.", category: "homework" },
      { label: "考", text: "考", category: "notice" },
      { label: "★ 訂正", text: "訂正", category: "homework", alert: true },
      { label: "★ 簽名", text: "簽名", category: "items", alert: true },
      { label: "★ 帶", text: "帶", category: "items", alert: true },
      { label: "小日記「」", text: "小日記「」", category: "homework" },
      { label: "閱讀「」", text: "閱讀「」", category: "homework" }
    ];

    let selectedDate = toDateKey(new Date());
    let state = loadState();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
        return {
          entries: saved.entries || {},
          events: Array.isArray(saved.events) ? saved.events : defaultEvents()
        };
      } catch {
        return { entries: {}, events: defaultEvents() };
      }
    }

    function defaultEvents() {
      const exam = new Date();
      exam.setDate(exam.getDate() + 12);
      return [{ id: "default-exam", title: "期末考", date: toDateKey(exam) }];
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function toDateKey(date) {
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 10);
    }

    function parseKey(key) {
      return new Date(`${key}T00:00:00`);
    }

    function formatRocDate(key) {
      const date = parseKey(key);
      const year = date.getFullYear() - 1911;
      return `民國 ${year} 年 ${date.getMonth() + 1} 月 ${date.getDate()} 日（${"日一二三四五六"[date.getDay()]}）`;
    }

    function shortDate(key) {
      const date = parseKey(key);
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function currentEntry() {
      if (!state.entries[selectedDate]) {
        state.entries[selectedDate] = { homework: "", items: "", notice: "" };
      }
      return state.entries[selectedDate];
    }

    function hasContent(key) {
      const entry = state.entries[key];
      return !!entry && Object.values(entry).some((value) => value.trim());
    }

    function lines(text, category) {
      return text
        .split(/\n+/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((text) => ({ text: text.replace(/^▶\s*/, ""), category }));
    }

    function boardItems() {
      const entry = currentEntry();
      return [
        ...lines(entry.homework || "", "homework"),
        ...lines(entry.items || "", "items"),
        ...lines(entry.notice || "", "notice")
      ];
    }

    function renderBoard() {
      const items = boardItems();
      selectedDateText.textContent = formatRocDate(selectedDate);
      blackboard.classList.toggle("vertical", viewMode.value === "vertical");
      boardList.innerHTML = "";

      const rows = items.length ? items : [{ text: "輸入後按 Enter，或點右側模板", category: "empty" }];
      rows.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="item-number">${items.length ? `${index + 1}.` : "+"}</span><span class="item-text ${item.category}">${item.text}</span>`;
        if (!items.length) li.classList.add("empty-line");
        boardList.appendChild(li);
      });
    }

    function renderEvents() {
      eventCards.innerHTML = "";
      const today = parseKey(toDateKey(new Date()));
      const events = state.events.slice().sort((a, b) => parseKey(a.date) - parseKey(b.date));
      if (!events.length) {
        eventCards.innerHTML = '<article class="event-card"><strong>尚未新增倒數</strong><span>可加入考試、校外教學、活動提醒。</span></article>';
        return;
      }
      events.forEach((event) => {
        const days = Math.ceil((parseKey(event.date) - today) / 86400000);
        const card = document.createElement("article");
        card.className = `event-card ${days <= 3 && days >= 0 ? "urgent" : ""}`;
        card.innerHTML = `<strong>📅 ${event.title || "重要事件"}：${days < 0 ? "已到期" : `還有 ${days} 天`}</strong><span>${event.date}</span>`;
        eventCards.appendChild(card);
      });
    }

    function renderCalendar() {
      calendarGrid.innerHTML = "";
      const today = new Date();
      monthTitle.textContent = `${today.getFullYear()} 年 ${today.getMonth() + 1} 月`;
      "日一二三四五六".split("").forEach((day) => {
        const head = document.createElement("div");
        head.className = "week-head";
        head.textContent = day;
        calendarGrid.appendChild(head);
      });
      const start = new Date();
      start.setDate(start.getDate() - 3);
      for (let index = 0; index < 14; index += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        const key = toDateKey(date);
        const button = document.createElement("button");
        button.className = `day-button ${key === selectedDate ? "active" : ""}`;
        button.type = "button";
        button.innerHTML = `${date.getDate()}${hasContent(key) ? '<span class="dot"></span>' : ""}`;
        button.addEventListener("click", () => {
          selectedDate = key;
          loadEntryToEditors();
          render();
        });
        calendarGrid.appendChild(button);
      }
    }

    function renderHistory() {
      historyList.innerHTML = "";
      const keys = Object.keys(state.entries).filter(hasContent).sort().reverse().slice(0, 8);
      if (!keys.length) {
        historyList.innerHTML = '<div class="event-card"><span>尚未有歷史紀錄</span></div>';
        return;
      }
      keys.forEach((key) => {
        const count = Object.values(state.entries[key]).flatMap((text) => text.split(/\n+/).filter(Boolean)).length;
        const button = document.createElement("button");
        button.className = "history-item";
        button.type = "button";
        button.textContent = `${key} (${count} 項)`;
        button.addEventListener("click", () => {
          selectedDate = key;
          loadEntryToEditors();
          render();
        });
        historyList.appendChild(button);
      });
    }

    function renderQuickButtons() {
      quickList.innerHTML = "";
      quickButtons.forEach((item) => {
        const button = document.createElement("button");
        button.className = `quick-button ${item.alert ? "alert" : ""}`;
        button.type = "button";
        button.textContent = item.label;
        button.addEventListener("click", () => {
          targetCategory.value = item.category;
          insertText(item.text);
        });
        quickList.appendChild(button);
      });
    }

    function editorByCategory(category) {
      return { homework: homeworkText, items: itemsText, notice: noticeText }[category];
    }

    function loadEntryToEditors() {
      const entry = currentEntry();
      homeworkText.value = entry.homework || "";
      itemsText.value = entry.items || "";
      noticeText.value = entry.notice || "";
      statusText.textContent = `已切換到 ${shortDate(selectedDate)}`;
    }

    function saveEditors() {
      state.entries[selectedDate] = {
        homework: homeworkText.value,
        items: itemsText.value,
        notice: noticeText.value
      };
      saveState();
      statusText.textContent = "已更新黑板";
      render();
    }

    function insertText(text) {
      const editor = editorByCategory(targetCategory.value);
      const prefix = editor.value.trim() ? "\n" : "";
      editor.value += `${prefix}${text}`;
      editor.focus();
      editor.selectionStart = editor.selectionEnd = editor.value.length;
      saveEditors();
    }

    function addEvent() {
      const title = eventTitle.value.trim();
      const date = eventDate.value;
      if (!title || !date) {
        statusText.textContent = "請輸入事件名稱與日期";
        return;
      }
      const id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
      state.events.push({ id, title, date });
      eventTitle.value = "";
      eventDate.value = "";
      saveState();
      statusText.textContent = "已新增倒數事件";
      renderEvents();
    }

    async function copyBoard() {
      const text = `${formatRocDate(selectedDate)}\n${boardItems().map((item, index) => `${index + 1}. ${item.text}`).join("\n")}`;
      try {
        await navigator.clipboard.writeText(text);
        statusText.textContent = "已複製聯絡簿內容";
      } catch {
        statusText.textContent = text;
      }
    }

    function render() {
      renderBoard();
      renderEvents();
      renderCalendar();
      renderHistory();
    }

    saveEvent.addEventListener("click", addEvent);
    saveContent.addEventListener("click", saveEditors);
    copyButton.addEventListener("click", copyBoard);
    viewMode.addEventListener("change", renderBoard);
    fullscreenButton.addEventListener("click", async () => {
      if (!document.fullscreenElement) await blackboard.requestFullscreen();
      else await document.exitFullscreen();
    });
    [homeworkText, itemsText, noticeText].forEach((editor) => {
      editor.addEventListener("blur", saveEditors);
    });

    renderQuickButtons();
    loadEntryToEditors();
    render();
  </script>
</body>
</html>
