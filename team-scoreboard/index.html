<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小組計分板</title>
  <style>
    :root {
      --ink: #243047;
      --muted: #65758f;
      --paper: #fff8fb;
      --panel: #ffffff;
      --pink: #ff8fc7;
      --purple: #9b7bff;
      --blue: #4f8cff;
      --green: #22b98f;
      --yellow: #ffd24a;
      --orange: #ffad4d;
      --red: #ff5d73;
      --line: rgba(255, 143, 199, 0.42);
      --shadow: 0 24px 60px rgba(111, 78, 143, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 12%, rgba(255, 210, 74, 0.48), transparent 22%),
        radial-gradient(circle at 90% 10%, rgba(155, 123, 255, 0.28), transparent 24%),
        radial-gradient(circle at 80% 88%, rgba(79, 140, 255, 0.22), transparent 24%),
        linear-gradient(135deg, rgba(255, 143, 199, 0.2), transparent 38%),
        var(--paper);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 173, 77, 0.42) 0 4px, transparent 5px),
        radial-gradient(circle, rgba(79, 140, 255, 0.32) 0 3px, transparent 4px),
        radial-gradient(circle, rgba(34, 185, 143, 0.28) 0 5px, transparent 6px);
      background-position: 32px 40px, 130px 96px, 230px 28px;
      background-size: 260px 180px, 310px 210px, 360px 260px;
      opacity: 0.8;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(290px, 350px) minmax(0, 1fr);
    }

    .sidebar {
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 247, 251, 0.92)),
        repeating-linear-gradient(135deg, rgba(255, 143, 199, 0.12) 0 14px, rgba(255, 210, 74, 0.1) 14px 28px);
      border-right: 3px dashed rgba(255, 143, 199, 0.55);
      backdrop-filter: blur(12px);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      margin-bottom: 14px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf4;
      color: #7b4ed8;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(255, 143, 199, 0.18);
    }

    .brand {
      display: inline-block;
      margin: 0 0 20px;
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 10px 24px rgba(155, 123, 255, 0.25);
    }

    .section {
      margin-top: 20px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: #8a4f8f;
      font-size: 14px;
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: #fffdf4;
      font-weight: 800;
    }

    .button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 900;
      box-shadow: 0 6px 0 rgba(255, 143, 199, 0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 rgba(255, 143, 199, 0.24);
    }

    .button:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(255, 143, 199, 0.2);
    }

    .button.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), var(--purple));
    }

    .button.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--red), #ff9a9e);
    }

    .button.good {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--green), #82dfc6);
    }

    .stack {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .main {
      padding: 28px;
    }

    .stage {
      width: min(100%, 1180px);
      margin: 0 auto;
    }

    .page-title {
      margin: 0 0 18px;
      color: #7b4ed8;
      text-align: center;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.9);
    }

    .board {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
      gap: 18px;
      align-items: start;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .team-card,
    .ranking-card {
      border: 4px solid rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 253, 244, 0.94)),
        linear-gradient(135deg, rgba(255, 143, 199, 0.18), rgba(79, 140, 255, 0.12));
      box-shadow: var(--shadow);
    }

    .team-card {
      position: relative;
      min-height: 262px;
      padding: 18px;
      overflow: hidden;
    }

    .team-card::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 110px;
      right: -34px;
      top: -34px;
      border-radius: 50%;
      background: var(--team-color);
      opacity: 0.26;
    }

    .team-name-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .team-name-row input {
      font-size: 20px;
      color: #7b4ed8;
    }

    .remove-button {
      width: 44px;
      min-height: 44px;
      border: 1px solid rgba(255, 93, 115, 0.42);
      border-radius: 8px;
      background: #fff0f3;
      color: var(--red);
      font-weight: 950;
    }

    .score {
      position: relative;
      z-index: 1;
      margin: 18px 0;
      color: #20304f;
      text-align: center;
      font-size: clamp(58px, 10vw, 104px);
      line-height: 0.95;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 6px 0 rgba(255, 210, 74, 0.45),
        0 14px 34px rgba(79, 140, 255, 0.16);
    }

    .score-actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .score-actions .button {
      min-height: 42px;
      font-size: 16px;
    }

    .ranking-card {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    .ranking-card h2 {
      margin: 0 0 14px;
      color: #7b4ed8;
      font-size: 26px;
      letter-spacing: 0;
    }

    .ranking-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .ranking-list li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 56px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      font-weight: 900;
    }

    .rank {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #fff;
      background: linear-gradient(135deg, var(--orange), var(--red));
    }

    .rank-score {
      color: #7b4ed8;
      font-size: 22px;
      font-variant-numeric: tabular-nums;
    }

    .winner {
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      background: #fff7d1;
      color: #8a5a00;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
    }

    .empty {
      padding: 28px;
      border: 3px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
      font-weight: 900;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 3px dashed rgba(255, 143, 199, 0.55);
      }

      .board {
        grid-template-columns: 1fr;
      }

      .ranking-card {
        position: static;
      }
    }

    @media (max-width: 700px) {
      .team-grid {
        grid-template-columns: 1fr;
      }

      .main {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar" aria-label="計分板設定">
      <a class="home-link" href="../index.html">← 回首頁</a>
      <h1 class="brand">小組計分板</h1>

      <div class="section stack">
        <label class="label" for="newTeamName">新增隊伍</label>
        <input id="newTeamName" type="text" value="第 5 組" maxlength="14">
        <button id="addTeam" class="button primary" type="button">新增隊伍</button>
      </div>

      <div class="section row">
        <button id="sortByScore" class="button" type="button">依分數排序</button>
        <button id="sortByOriginal" class="button" type="button">回原順序</button>
      </div>

      <div class="section stack">
        <label class="label" for="bonusSelect">快速加分</label>
        <select id="bonusSelect">
          <option value="1">每組 +1</option>
          <option value="5">每組 +5</option>
          <option value="10">每組 +10</option>
        </select>
        <button id="bonusAll" class="button good" type="button">全部加分</button>
      </div>

      <div class="section row">
        <button id="resetScores" class="button danger" type="button">分數歸零</button>
        <button id="resetAll" class="button danger" type="button">重置全部</button>
      </div>
    </aside>

    <main class="main">
      <section class="stage" aria-live="polite">
        <h2 class="page-title">今天哪一組最閃亮？</h2>
        <div class="board">
          <div class="team-grid" id="teamGrid"></div>

          <aside class="ranking-card" aria-label="排行榜">
            <h2>排行榜</h2>
            <ol class="ranking-list" id="rankingList"></ol>
            <div class="winner" id="winner">準備開始比賽</div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <script>
    const teamGrid = document.querySelector("#teamGrid");
    const rankingList = document.querySelector("#rankingList");
    const winner = document.querySelector("#winner");
    const newTeamName = document.querySelector("#newTeamName");
    const addTeam = document.querySelector("#addTeam");
    const sortByScore = document.querySelector("#sortByScore");
    const sortByOriginal = document.querySelector("#sortByOriginal");
    const bonusSelect = document.querySelector("#bonusSelect");
    const bonusAll = document.querySelector("#bonusAll");
    const resetScores = document.querySelector("#resetScores");
    const resetAll = document.querySelector("#resetAll");

    const storageKey = "jessie-toolbox-team-scoreboard";
    const activityLogKey = "jessie-toolbox-activity-log";
    const teacherAccessKey = "jessie-toolbox-teacher-unlocked";
    const colors = ["#ffd24a", "#ff8fc7", "#9b7bff", "#22b98f", "#4f8cff", "#ffad4d", "#ff5d73", "#82dfc6"];
    let teams = [
      { id: crypto.randomUUID(), name: "第 1 組", score: 0, order: 0 },
      { id: crypto.randomUUID(), name: "第 2 組", score: 0, order: 1 },
      { id: crypto.randomUUID(), name: "第 3 組", score: 0, order: 2 },
      { id: crypto.randomUUID(), name: "第 4 組", score: 0, order: 3 }
    ];
    let boardMode = "original";

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify({ teams, boardMode }));
    }

    function logActivity(entry) {
      try {
        const logs = JSON.parse(localStorage.getItem(activityLogKey) || "[]");
        logs.push({
          id: crypto.randomUUID(),
          time: new Date().toISOString(),
          tool: "team-scoreboard",
          ...entry
        });
        localStorage.setItem(activityLogKey, JSON.stringify(logs.slice(-1500)));
      } catch {
        localStorage.setItem(activityLogKey, "[]");
      }
    }

    function confirmTeacherAction(actionName) {
      if (sessionStorage.getItem(teacherAccessKey) === "true") return true;
      window.alert(`教師後台尚未解鎖，無法執行「${actionName}」。請先到教師控制後台輸入密碼。`);
      return false;
    }

    function confirmTeacherAccess(actionName) {
      return confirmTeacherAction(actionName);
    }

    function loadState() {
      try {
        const state = JSON.parse(localStorage.getItem(storageKey) || "{}");
        if (Array.isArray(state.teams) && state.teams.length) teams = state.teams;
        if (state.boardMode === "score" || state.boardMode === "original") boardMode = state.boardMode;
      } catch {
        localStorage.removeItem(storageKey);
      }
    }

    function orderedTeams() {
      if (boardMode === "score") {
        return [...teams].sort((a, b) => b.score - a.score || a.order - b.order);
      }
      return [...teams].sort((a, b) => a.order - b.order);
    }

    function rankedTeams() {
      return [...teams].sort((a, b) => b.score - a.score || a.order - b.order);
    }

    function updateScore(id, delta) {
      if (!confirmTeacherAccess("修改小組分數")) return;
      teams = teams.map((team) => {
        if (team.id !== id) return team;
        const nextScore = team.score + delta;
        if (delta !== 0) {
          logActivity({
            category: "team",
            subject: team.name,
            teamId: team.id,
            delta,
            before: team.score,
            after: nextScore,
            note: "小組計分"
          });
        }
        return { ...team, score: nextScore };
      });
      render();
    }

    function updateName(id, name) {
      if (!confirmTeacherAccess("修改隊伍名稱")) return;
      teams = teams.map((team) => team.id === id ? { ...team, name: name.trim() || "未命名" } : team);
      render(false);
    }

    function removeTeam(id) {
      if (!confirmTeacherAction("刪除隊伍")) return;
      teams = teams.filter((team) => team.id !== id);
      render();
    }

    function renderTeams() {
      teamGrid.innerHTML = "";
      const list = orderedTeams();
      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "目前沒有隊伍，請新增隊伍。";
        teamGrid.appendChild(empty);
        return;
      }

      list.forEach((team, index) => {
        const card = document.createElement("article");
        card.className = "team-card";
        card.style.setProperty("--team-color", colors[index % colors.length]);
        card.innerHTML = `
          <div class="team-name-row">
            <input aria-label="隊伍名稱" value="${team.name.replaceAll('"', "&quot;")}">
            <button class="remove-button" type="button" aria-label="刪除 ${team.name}">×</button>
          </div>
          <div class="score">${team.score}</div>
          <div class="score-actions">
            <button class="button" type="button" data-delta="-5">-5</button>
            <button class="button" type="button" data-delta="-1">-1</button>
            <button class="button good" type="button" data-delta="1">+1</button>
            <button class="button good" type="button" data-delta="5">+5</button>
            <button class="button good" type="button" data-delta="10">+10</button>
            <button class="button danger" type="button" data-delta="${-team.score}">歸零</button>
          </div>
        `;

        card.querySelector("input").addEventListener("change", (event) => updateName(team.id, event.target.value));
        card.querySelector(".remove-button").addEventListener("click", () => removeTeam(team.id));
        card.querySelectorAll("[data-delta]").forEach((button) => {
          button.addEventListener("click", () => updateScore(team.id, Number(button.dataset.delta)));
        });
        teamGrid.appendChild(card);
      });
    }

    function renderRanking() {
      rankingList.innerHTML = "";
      const list = rankedTeams();
      list.forEach((team, index) => {
        const item = document.createElement("li");
        item.innerHTML = `
          <span class="rank">${index + 1}</span>
          <span>${team.name}</span>
          <span class="rank-score">${team.score}</span>
        `;
        rankingList.appendChild(item);
      });

      if (!list.length) {
        winner.textContent = "請先新增隊伍";
        return;
      }

      const topScore = list[0].score;
      const leaders = list.filter((team) => team.score === topScore);
      if (leaders.length === teams.length && topScore === 0) {
        winner.textContent = "準備開始比賽";
      } else if (leaders.length > 1) {
        winner.textContent = `目前並列第一：${leaders.map((team) => team.name).join("、")}`;
      } else {
        winner.textContent = `目前領先：${leaders[0].name}`;
      }
    }

    function render(shouldSave = true) {
      renderTeams();
      renderRanking();
      if (shouldSave) saveState();
    }

    addTeam.addEventListener("click", () => {
      if (!confirmTeacherAccess("新增隊伍")) return;
      const name = newTeamName.value.trim() || `第 ${teams.length + 1} 組`;
      const maxOrder = teams.reduce((max, team) => Math.max(max, team.order), -1);
      teams = [...teams, { id: crypto.randomUUID(), name, score: 0, order: maxOrder + 1 }];
      newTeamName.value = `第 ${teams.length + 1} 組`;
      render();
    });

    newTeamName.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addTeam.click();
    });

    sortByScore.addEventListener("click", () => {
      boardMode = "score";
      render();
    });

    sortByOriginal.addEventListener("click", () => {
      boardMode = "original";
      render();
    });

    bonusAll.addEventListener("click", () => {
      if (!confirmTeacherAccess("全部隊伍加分")) return;
      const bonus = Number(bonusSelect.value);
      teams = teams.map((team) => {
        const nextScore = team.score + bonus;
        if (bonus !== 0) {
          logActivity({
            category: "team",
            subject: team.name,
            teamId: team.id,
            delta: bonus,
            before: team.score,
            after: nextScore,
            note: "全部隊伍加分"
          });
        }
        return { ...team, score: nextScore };
      });
      render();
    });

    resetScores.addEventListener("click", () => {
      if (!confirmTeacherAction("分數歸零")) return;
      teams = teams.map((team) => ({ ...team, score: 0 }));
      render();
    });

    resetAll.addEventListener("click", () => {
      if (!confirmTeacherAction("重置全部")) return;
      localStorage.removeItem(storageKey);
      teams = [
        { id: crypto.randomUUID(), name: "第 1 組", score: 0, order: 0 },
        { id: crypto.randomUUID(), name: "第 2 組", score: 0, order: 1 },
        { id: crypto.randomUUID(), name: "第 3 組", score: 0, order: 2 },
        { id: crypto.randomUUID(), name: "第 4 組", score: 0, order: 3 }
      ];
      boardMode = "original";
      newTeamName.value = "第 5 組";
      render();
    });

    loadState();
    render();
  </script>
</body>
</html>
